<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サムネイル一括生成（メンテナンス）</title>
<style>
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
       background:#EEF2F8; color:#1A2333; max-width:640px; margin:0 auto; padding:16px;}
  h1{font-size:17px; color:#1F3864; border-bottom:2px solid #1F3864; padding-bottom:8px; margin-bottom:12px;}
  p{font-size:13.5px; line-height:1.8; color:#44506B; margin-bottom:12px;}
  .btn{border:none; border-radius:8px; font-weight:700; font-size:16px;
       padding:14px 22px; cursor:pointer; color:#fff; background:#1F3864; width:100%;}
  .btn:disabled{opacity:.45;}
  #bar{height:14px; background:#D8E0EE; border-radius:99px; overflow:hidden; margin:14px 0 6px;}
  #barIn{height:100%; width:0%; background:#2E5496; transition:width .3s;}
  #stat{font-size:13px; font-weight:700; color:#1F3864; margin-bottom:10px;}
  #log{background:#fff; border:1px solid #C8D2E4; border-radius:8px; padding:10px;
       font-size:12px; line-height:1.7; height:320px; overflow-y:auto; white-space:pre-wrap;}
  .ok{color:#2E7D52;} .ng{color:#B5403B;}
</style>
</head>
<body>
<h1>過去分サムネイル 一括生成</h1>
<p>サムネイル未作成（thumb_path が空）の記録を探し、写真・動画からサムネイルを作って保存します。
処理中はこの画面を開いたままにしてください。途中で止まっても、もう一度実行すれば残りだけ処理されます。</p>
<button class="btn" id="run" onclick="start()">開始</button>
<div id="bar"><div id="barIn"></div></div>
<div id="stat">待機中</div>
<div id="log"></div>

<script>
/* ==== 設定（アプリ本体と同じ値） ==== */
const SUPABASE_URL      = "https://oxekrlgsfkhjaqssrzvk.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_jXTK6ilznGBS-BEx8Ibcfw_kqOQhrv7";
const BUCKET   = "poster-media";
const TABLE    = "posters";
const PASSCODE = "sano2026";
const THUMB_PX = 420, THUMB_Q = 0.7;
/* ==================================== */

const $=id=>document.getElementById(id);
const sb=(p,o={})=>fetch(SUPABASE_URL+p,{...o,headers:{
  "apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY,...(o.headers||{})}});
const pubUrl=p=>`${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${p}`;
function log(msg,cls){ const d=$("log"); d.innerHTML+=`<span class="${cls||""}">${msg}</span>\n`; d.scrollTop=d.scrollHeight; }

if(PASSCODE && localStorage.getItem("poster_gate")!=="ok"){
  const v=prompt("パスコードを入力してください");
  if(v===PASSCODE) localStorage.setItem("poster_gate","ok");
  else{ document.body.innerHTML="<p>パスコードが違います。</p>"; throw new Error("gate"); }
}

async function imageThumb(blob){
  const bmp=await createImageBitmap(blob);
  const s=Math.min(1, THUMB_PX/Math.max(bmp.width,bmp.height));
  const cv=document.createElement("canvas");
  cv.width=Math.max(1,Math.round(bmp.width*s)); cv.height=Math.max(1,Math.round(bmp.height*s));
  cv.getContext("2d").drawImage(bmp,0,0,cv.width,cv.height);
  return new Promise(r=>cv.toBlob(r,"image/jpeg",THUMB_Q));
}
function videoThumb(blob){
  return new Promise(resolve=>{
    const v=document.createElement("video");
    v.muted=true; v.playsInline=true; v.preload="auto";
    v.src=URL.createObjectURL(blob);
    const giveup=setTimeout(()=>resolve(null), 15000);
    v.onloadeddata=()=>{ try{ v.currentTime=0.1; }catch(e){} };
    v.onseeked=()=>{
      try{
        const s=Math.min(1, 480/Math.max(v.videoWidth,v.videoHeight));
        const cv=document.createElement("canvas");
        cv.width=Math.max(1,Math.round(v.videoWidth*s)); cv.height=Math.max(1,Math.round(v.videoHeight*s));
        cv.getContext("2d").drawImage(v,0,0,cv.width,cv.height);
        cv.toBlob(b=>{clearTimeout(giveup); resolve(b);},"image/jpeg",THUMB_Q);
      }catch(e){clearTimeout(giveup); resolve(null);}
    };
    v.onerror=()=>{clearTimeout(giveup); resolve(null);};
  });
}

async function start(){
  $("run").disabled=true;
  try{
    log("対象を検索中…");
    const res=await sb(`/rest/v1/${TABLE}?select=id,media_path,media_type&thumb_path=is.null&order=created_at.asc&limit=1000`);
    if(!res.ok) throw new Error(await res.text());
    const list=await res.json();
    log(`対象 ${list.length} 件`);
    if(!list.length){ $("stat").textContent="対象なし（すべてサムネイル済みです）"; $("run").disabled=false; return; }

    let ok=0, ng=0;
    for(let i=0;i<list.length;i++){
      const r=list[i];
      $("stat").textContent=`処理中 ${i+1} / ${list.length}（成功${ok}・失敗${ng}）`;
      $("barIn").style.width=Math.round((i)/list.length*100)+"%";
      try{
        const f=await fetch(pubUrl(r.media_path));
        if(!f.ok) throw new Error("元ファイル取得失敗 "+f.status);
        const blob=await f.blob();
        const t = r.media_type==="video" ? await videoThumb(blob) : await imageThumb(blob);
        if(!t) throw new Error("サムネイル生成失敗");
        const thumbPath=r.media_path.replace(/\.[^.\/]+$/,"")+"_t.jpg";
        const up=await sb(`/storage/v1/object/${BUCKET}/${thumbPath}`,{
          method:"POST", headers:{"Content-Type":"image/jpeg","x-upsert":"true"}, body:t});
        if(!up.ok) throw new Error("アップロード失敗 "+await up.text());
        const pa=await sb(`/rest/v1/${TABLE}?id=eq.${r.id}`,{
          method:"PATCH", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({thumb_path:thumbPath})});
        if(!pa.ok) throw new Error("DB更新失敗 "+await pa.text());
        ok++; log(`OK  ${r.media_path}`,"ok");
      }catch(e){
        ng++; log(`NG  ${r.media_path} … ${e.message}`,"ng");
      }
    }
    $("barIn").style.width="100%";
    $("stat").textContent=`完了：成功 ${ok} 件 ／ 失敗 ${ng} 件`;
    log(ng? "失敗分は再度「開始」を押すと残りだけ再処理されます。":"すべて完了しました。アプリの一覧を「更新」してください。");
  }catch(e){
    log("エラー: "+e.message,"ng");
    $("stat").textContent="中断しました";
  }finally{
    $("run").disabled=false;
  }
}
</script>
</body>
</html>
