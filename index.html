<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F3864">
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">
<title>選挙情報管理</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --navy:#1F3864; --navy2:#2E5496; --bg:#EEF2F8; --card:#FFFFFF;
    --line:#C8D2E4; --text:#1A2333; --sub:#5A6B8C; --red:#B5403B; --green:#2E7D52;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    background:var(--bg); color:var(--text); font-size:15px;
    padding-top:var(--hh,56px);              /* 固定ヘッダー分の余白 */
    padding-bottom:env(safe-area-inset-bottom);
  }
  /* ===== ヘッダー（1行・常に最上部に固定） ===== */
  header{
    position:fixed; top:0; left:0; right:0; z-index:50;
    background:var(--navy);
    display:flex; align-items:center; gap:6px;
    padding:8px 10px;
  }
  .hbtn{
    flex:1; border:1px solid rgba(255,255,255,.55); background:transparent; color:#fff;
    border-radius:8px; padding:11px 2px; font-size:13.5px; font-weight:700; cursor:pointer;
    white-space:nowrap;
  }
  .hbtn:active{opacity:.75;}
  .hbtn.primary{background:#fff; color:var(--navy); border-color:#fff; flex:1.35;}
  .hbtn.active{background:var(--navy2); border-color:var(--navy2);}

  main{max-width:560px; margin:0 auto; padding:10px 12px;}
  .view{display:none;}
  .view.show{display:block;}

  .btn{
    border:none; border-radius:8px; font-weight:700; font-size:15px;
    padding:13px 14px; cursor:pointer; color:#fff; background:var(--navy);
  }
  .btn:active{opacity:.8;}
  .btn.sub{background:#fff; color:var(--navy); border:1.5px solid var(--navy); font-size:13px; padding:10px 12px;}
  .btn.wide{flex:1;}
  .btn:disabled{opacity:.45;}

  /* ===== 撮影画面（カメラ枠は縦長） ===== */
  .preview{
    background:#DDE3EE; border:1px solid var(--line); border-radius:10px;
    width:100%; aspect-ratio:3/4; max-height:46dvh; overflow:hidden;
    display:flex; align-items:center; justify-content:center; position:relative;
    margin:0 auto;
  }
  .preview img,.preview video{width:100%; height:100%; object-fit:contain; background:#000;}
  .preview .ph{color:#9AA8C4; text-align:center; font-size:13px; line-height:1.7;}
  .preview .ph .ico{font-size:44px; display:block;}
  .badge-media{
    position:absolute; top:8px; left:8px; background:rgba(31,56,100,.85);
    color:#fff; font-size:11px; font-weight:700; padding:3px 8px; border-radius:99px; z-index:2;
  }
  .gps-line{
    display:flex; align-items:center; gap:6px; margin:7px 2px 8px;
    font-size:12px; color:var(--sub);
  }
  .gps-dot{width:8px; height:8px; border-radius:50%; background:#C0392B;}
  .gps-dot.ok{background:var(--green);}

  /* メモ（高さ拡大＋音声入力） */
  .memo-wrap{position:relative; margin-bottom:10px;}
  .memo-wrap textarea{
    width:100%; min-height:150px; resize:vertical;
    border:1.5px solid var(--line); border-radius:10px; background:#fff;
    padding:12px 52px 12px 12px; font-size:16px; line-height:1.6; font-family:inherit;
  }
  .memo-wrap textarea:focus{outline:2px solid var(--navy2); border-color:var(--navy2);}
  .mic-btn{
    position:absolute; right:8px; top:8px; width:40px; height:40px;
    border-radius:50%; border:1.5px solid var(--navy); background:#fff;
    font-size:19px; color:var(--navy); cursor:pointer;
  }
  .mic-btn.rec{background:var(--red); border-color:var(--red); color:#fff; animation:pulse 1.1s infinite;}
  @keyframes pulse{50%{box-shadow:0 0 0 8px rgba(181,64,59,.25);}}

  /* ===== 分類チェック（Poster / People 2段） ===== */
  .cat-group{display:flex; align-items:center; gap:6px; margin-bottom:8px;}
  .glabel{
    width:56px; flex:none; font-size:12px; font-weight:700; color:var(--navy);
    letter-spacing:.02em;
  }
  .cat{
    flex:1; display:flex; align-items:center; justify-content:center; gap:5px;
    background:#fff; border:1.5px solid var(--line); border-radius:8px;
    padding:11px 2px; font-size:13px; font-weight:700; color:var(--sub); cursor:pointer;
    user-select:none; white-space:nowrap;
  }
  .cat input{width:17px; height:17px; accent-color:var(--navy); flex:none;}
  .cat.on{border-color:var(--navy); color:var(--navy); background:#E9EFFA;}

  .save-row{display:flex; gap:8px; margin-top:4px;}
  #btnSave{flex:1; font-size:17px; padding:15px;}

  /* ===== 一覧画面 ===== */
  .search-bar{
    display:flex; gap:8px; margin-bottom:10px;
    position:sticky; top:var(--hh,56px); z-index:40;   /* スクロールしても上部固定 */
    background:var(--bg); padding:8px 0;
  }
  .search-bar input{
    flex:1; border:1.5px solid var(--line); border-radius:8px; padding:11px 12px;
    font-size:15px; background:#fff; min-width:0;
  }
  .search-bar input:focus{outline:2px solid var(--navy2);}
  .mic-btn.inline{position:static; flex:none;}

  /* ===== 画像拡大ビューア（ピンチで拡大） ===== */
  #zoom{
    display:none; position:fixed; inset:0; z-index:1500; background:#000;
    touch-action:none; overflow:hidden;
  }
  #zoom.show{display:block;}
  #zoomImg{
    position:absolute; left:0; top:0; width:100%; height:100%;
    object-fit:contain; transform-origin:0 0; will-change:transform;
    user-select:none; -webkit-user-drag:none;
  }
  #zoomClose{
    position:absolute; top:calc(10px + env(safe-area-inset-top)); right:12px; z-index:2;
    width:42px; height:42px; border-radius:50%; border:none;
    background:rgba(255,255,255,.22); color:#fff; font-size:20px; cursor:pointer;
  }
  #zoomHint{
    position:absolute; bottom:calc(14px + env(safe-area-inset-bottom)); left:0; right:0;
    text-align:center; color:rgba(255,255,255,.75); font-size:12px; pointer-events:none;
  }
  .count-line{font-size:12px; color:var(--sub); margin:0 2px 8px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    overflow:hidden; cursor:pointer;
  }
  .card .thumb{width:100%; aspect-ratio:3/4; object-fit:cover; background:#DDE3EE; display:block;}
  .card .meta{padding:7px 8px 8px;}
  .card .dt{font-size:11px; color:var(--navy); font-weight:700;}
  .card .addr{font-size:11px; color:var(--sub); overflow:hidden; white-space:nowrap; text-overflow:ellipsis;}
  .card .memo1{font-size:12px; color:var(--text); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; margin-top:2px;}
  .card .tags{margin-top:4px; display:flex; gap:4px; flex-wrap:wrap;}
  .tag{font-size:10px; font-weight:700; color:#fff; background:var(--navy2); border-radius:99px; padding:2px 7px;}
  .vbadge{position:absolute; margin:6px; background:rgba(0,0,0,.6); color:#fff; font-size:10px; border-radius:4px; padding:2px 6px;}
  .thumb-wrap{position:relative;}
  .empty{color:var(--sub); text-align:center; padding:40px 0; font-size:13px; line-height:1.8;}

  /* ===== モーダル共通 ===== */
  .modal{
    display:none; position:fixed; inset:0; z-index:1200;
    background:rgba(20,30,55,.55); padding:14px;
    align-items:center; justify-content:center;
  }
  .modal.show{display:flex;}
  .modal .box{
    background:#fff; border-radius:12px; width:100%; max-width:520px;
    max-height:92dvh; overflow-y:auto; padding:14px;
  }
  .modal .box h2{
    font-size:15px; color:var(--navy); border-bottom:2px solid var(--navy);
    padding-bottom:8px; margin-bottom:10px; display:flex; align-items:center;
  }
  .modal .box h2 .x{margin-left:auto; border:none; background:none; font-size:20px; color:var(--sub); cursor:pointer;}
  .modal .media{width:100%; max-height:48dvh; object-fit:contain; background:#000; border-radius:8px; display:block;}
  .detail-meta{font-size:12px; color:var(--sub); margin:8px 2px; line-height:1.8;}
  .ocr-box{margin:0 0 8px;}
  .ocr-box summary{
    font-size:12.5px; font-weight:700; color:var(--navy); cursor:pointer;
    padding:8px 10px; background:#E9EFFA; border-radius:8px; user-select:none;
  }
  .ocr-text{
    font-size:12.5px; line-height:1.7; color:var(--text); white-space:pre-wrap;
    background:#F7F9FD; border:1px solid var(--line); border-radius:8px;
    padding:10px; margin-top:6px; max-height:180px; overflow-y:auto;
  }
  .ocr-run{width:100%; margin:0 0 8px;}
  .modal .memo-wrap textarea{min-height:110px; padding-right:52px;}
  .modal .actions{display:flex; gap:8px; margin-top:8px;}
  .btn.danger{background:#fff; color:var(--red); border:1.5px solid var(--red);}

  /* ===== 地図ビュー ===== */
  #viewMap.show{display:block;}
  .legend{
    display:flex; gap:6px; overflow-x:auto; padding:2px 0 8px;
    -webkit-overflow-scrolling:touch;
  }
  .legend::-webkit-scrollbar{display:none;}
  .lg{
    flex:none; display:flex; align-items:center; gap:5px;
    background:#fff; border:1.5px solid var(--line); border-radius:99px;
    padding:7px 11px; font-size:12.5px; font-weight:700; color:var(--text);
    cursor:pointer; user-select:none; white-space:nowrap;
  }
  .lg .sw{width:13px; height:13px; border-radius:3px; border:1px solid rgba(0,0,0,.25); flex:none;}
  .lg.active{border-color:var(--navy); background:#E9EFFA; color:var(--navy);}
  #map{
    width:100%; height:calc(100dvh - var(--hh,56px) - 108px);
    border:1px solid var(--line); border-radius:10px; background:#DDE3EE;
    position:relative; z-index:0;   /* Leaflet内部のz-indexをこの枠内に閉じ込める */
  }
  #mapCount{font-size:12px; color:var(--sub); margin:6px 2px 0;}
  .pin-ico{filter:drop-shadow(0 2px 2px rgba(0,0,0,.35));}

  /* トースト */
  #toast{
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%);
    background:var(--navy); color:#fff; font-size:14px; font-weight:700;
    padding:11px 20px; border-radius:99px; z-index:1300; display:none;
    box-shadow:0 4px 16px rgba(0,0,0,.25); max-width:88%; text-align:center;
  }
  #toast.err{background:var(--red);}
  #toast.show{display:block;}

  /* パスコード */
  #gate{position:fixed; inset:0; z-index:1400; background:var(--navy);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; padding:20px;}
  #gate h1{color:#fff; font-size:18px; letter-spacing:.1em;}
  #gate input{font-size:20px; padding:12px; border-radius:8px; border:none; text-align:center; width:220px; letter-spacing:.2em;}
  #gate button{font-size:15px;}
  #gate .msg{color:#FFC7C2; font-size:13px; min-height:1.2em;}

  .spinner{
    display:inline-block; width:15px; height:15px; border:2.5px solid rgba(255,255,255,.4);
    border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- ===== 簡易パスコードゲート ===== -->
<div id="gate">
  <h1>選挙情報管理</h1>
  <input id="gateInput" type="password" inputmode="numeric" placeholder="パスコード" autocomplete="off">
  <button class="btn" onclick="checkGate()">開く</button>
  <div class="msg" id="gateMsg"></div>
</div>

<!-- ===== ヘッダー1行：確認 一覧 動画 写真撮影 ===== -->
<header>
  <button class="hbtn" onclick="openConfirm()">確認</button>
  <button class="hbtn" id="hList" onclick="switchView('list')">一覧</button>
  <button class="hbtn" id="hMap" onclick="switchView('map')">地図</button>
  <button class="hbtn" onclick="switchView('shoot'); pickMedia('video')">動画</button>
  <button class="hbtn primary" onclick="switchView('shoot'); pickMedia('photo')">&#128247; 写真撮影</button>
</header>

<main>
  <!-- ===== 撮影ビュー ===== -->
  <section id="viewShoot" class="view show">
    <input type="file" id="fileP" accept="image/*" capture="environment" hidden>
    <input type="file" id="fileV" accept="video/*" capture="environment" hidden>

    <div class="preview" id="preview">
      <div class="ph"><span class="ico">&#128247;</span>上の「写真撮影」を押して<br>記録を開始してください</div>
    </div>
    <div class="gps-line">
      <span class="gps-dot" id="gpsDot"></span><span id="gpsText">位置情報を取得中…</span>
    </div>

    <div class="memo-wrap">
      <textarea id="memo" placeholder="ポスター・名刺・後援者との会話などなんでも記録&#10;※場所と時間は自動記録"></textarea>
      <button class="mic-btn" id="micMemo" onclick="toggleMic('memo','micMemo')" title="音声入力">&#127908;</button>
    </div>

    <div class="cat-group">
      <span class="glabel">Poster:</span>
      <label class="cat"><input type="checkbox" id="catSano">佐野</label>
      <label class="cat"><input type="checkbox" id="catOther">他候補</label>
      <label class="cat"><input type="checkbox" id="catRegion">地域情報</label>
    </div>
    <div class="cat-group">
      <span class="glabel">People:</span>
      <label class="cat"><input type="checkbox" id="catCard">名刺</label>
      <label class="cat"><input type="checkbox" id="catTalk">後援者会話</label>
      <label class="cat"><input type="checkbox" id="catMisc">その他</label>
    </div>

    <div class="save-row">
      <button class="btn" id="btnSave" onclick="save()">保存</button>
    </div>
  </section>

  <!-- ===== 一覧ビュー ===== -->
  <section id="viewList" class="view">
    <div class="search-bar">
      <input id="q" placeholder="メモ・日時・住所・分類のフリー検索" oninput="renderList()">
      <button class="mic-btn inline" id="micSearch" onclick="toggleMic('q','micSearch')" title="音声入力">&#127908;</button>
      <button class="btn sub" onclick="loadList(true)">検索</button>
    </div>
    <div class="count-line" id="countLine"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="emptyMsg" style="display:none;">データがありません。<br>「写真撮影」から保存してください。</div>
  </section>

  <!-- ===== 地図ビュー（All Display Map） ===== -->
  <section id="viewMap" class="view">
    <div class="legend" id="legend"></div>
    <div id="map"></div>
    <div id="mapCount"></div>
  </section>
</main>

<!-- ===== 直前分・確認モーダル ===== -->
<div class="modal" id="mConfirm">
  <div class="box">
    <h2>直前の保存分 <button class="x" onclick="closeModal('mConfirm')">&#10005;</button></h2>
    <div id="confirmBody"></div>
  </div>
</div>

<!-- ===== 詳細・修正モーダル ===== -->
<div class="modal" id="mDetail">
  <div class="box">
    <h2>修正・追加 <button class="x" onclick="closeModal('mDetail')">&#10005;</button></h2>
    <div id="detailMedia"></div>
    <div class="detail-meta" id="detailMeta"></div>
    <div id="detailOcr"></div>
    <div class="memo-wrap">
      <textarea id="editMemo" placeholder="メモ（音声入力できます）"></textarea>
      <button class="mic-btn" id="micEdit" onclick="toggleMic('editMemo','micEdit')" title="音声入力">&#127908;</button>
    </div>
    <div class="cat-group">
      <span class="glabel">Poster:</span>
      <label class="cat"><input type="checkbox" id="eSano">佐野</label>
      <label class="cat"><input type="checkbox" id="eOther">他候補</label>
      <label class="cat"><input type="checkbox" id="eRegion">地域情報</label>
    </div>
    <div class="cat-group">
      <span class="glabel">People:</span>
      <label class="cat"><input type="checkbox" id="eCard">名刺</label>
      <label class="cat"><input type="checkbox" id="eTalk">後援者会話</label>
      <label class="cat"><input type="checkbox" id="eMisc">その他</label>
    </div>
    <div class="actions">
      <button class="btn wide" onclick="updateRecord()">修正を保存</button>
      <button class="btn danger" onclick="deleteRecord()">削除</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ===== 画像拡大ビューア ===== -->
<div id="zoom">
  <img id="zoomImg" draggable="false">
  <button id="zoomClose" onclick="closeZoom()">&#10005;</button>
  <div id="zoomHint">ピンチで拡大／ダブルタップで切替</div>
</div>

<script>
/* ================================================================
   設定
================================================================ */
const SUPABASE_URL      = "https://oxekrlgsfkhjaqssrzvk.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_jXTK6ilznGBS-BEx8Ibcfw_kqOQhrv7";
const BUCKET            = "poster-media";
const TABLE             = "posters";
const PASSCODE          = "sano2026";      // ""で無効化
const GEOCODE_FN        = "geocode";
const MAX_IMG_PX        = 1600;
/* ================================================================ */

const CATS = [
  {key:"cat_sano",  id:"catSano",  eid:"eSano",  label:"佐野",     color:"#D93025"},
  {key:"cat_other", id:"catOther", eid:"eOther", label:"他候補",   color:"#757575"},
  {key:"cat_region",id:"catRegion",eid:"eRegion",label:"地域情報", color:"#9C27B0"},
  {key:"cat_card",  id:"catCard",  eid:"eCard",  label:"名刺",     color:"#7CB342"},
  {key:"cat_talk",  id:"catTalk",  eid:"eTalk",  label:"後援者会話",color:"#F4C513"},
  {key:"cat_misc",  id:"catMisc",  eid:"eMisc",  label:"その他",   color:"#266489"}
];
const ALL_COLOR = "#F0A500";   // 「全部」の凡例色

const $ = id => document.getElementById(id);
const sb = (path, opt={}) => fetch(SUPABASE_URL + path, {
  ...opt,
  headers: {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    ...(opt.headers||{})
  }
});
const pubUrl = p => `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${p}`;

/* ---------- パスコード ---------- */
function checkGate(){
  if($("gateInput").value === PASSCODE){
    localStorage.setItem("poster_gate","ok");
    $("gate").style.display="none";
  }else{
    $("gateMsg").textContent="パスコードが違います";
  }
}
if(!PASSCODE || localStorage.getItem("poster_gate")==="ok"){
  $("gate").style.display="none";
}
$("gateInput").addEventListener("keydown", e=>{ if(e.key==="Enter") checkGate(); });

/* ---------- ヘッダー高さ → 検索窓の固定位置に反映 ---------- */
function setHH(){
  document.documentElement.style.setProperty("--hh", document.querySelector("header").offsetHeight + "px");
}
setHH(); window.addEventListener("resize", setHH);

/* ---------- トースト ---------- */
let toastTimer;
function toast(msg, err){
  const t=$("toast");
  t.textContent=msg; t.className= err ? "err show" : "show";
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"), 2600);
}

/* ---------- ビュー切替 ---------- */
function switchView(v){
  $("viewShoot").classList.toggle("show", v==="shoot");
  $("viewList").classList.toggle("show", v==="list");
  $("viewMap").classList.toggle("show", v==="map");
  $("hList").classList.toggle("active", v==="list");
  $("hMap").classList.toggle("active", v==="map");
  if(v==="list") loadList(!listLoaded);
  if(v==="map"){ initMap(); loadList(true); }   // 地図は開くたびに自動で最新取得（更新ボタン不要）
}

/* ---------- 位置情報（起動時から先読み） ---------- */
let curPos=null;
function watchGPS(){
  if(!navigator.geolocation){ $("gpsText").textContent="この端末は位置情報に非対応です"; return; }
  navigator.geolocation.watchPosition(
    p=>{
      curPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
      $("gpsDot").classList.add("ok");
      $("gpsText").textContent=`位置情報 取得済（精度 約${Math.round(p.coords.accuracy)}m）`;
    },
    e=>{ $("gpsText").textContent="位置情報が取得できません（設定で許可してください）"; },
    {enableHighAccuracy:true, maximumAge:15000, timeout:20000}
  );
}
watchGPS();

/* ---------- 撮影・プレビュー ---------- */
let curFile=null, curType="image";
function pickMedia(kind){ (kind==="photo" ? $("fileP") : $("fileV")).click(); }
$("fileP").addEventListener("change", e=>setMedia(e.target.files[0], "image"));
$("fileV").addEventListener("change", e=>setMedia(e.target.files[0], "video"));

function setMedia(f, type){
  if(!f) return;
  curFile=f; curType=type;
  const url=URL.createObjectURL(f);
  $("preview").innerHTML = type==="image"
    ? `<span class="badge-media">写真</span><img src="${url}">`
    : `<span class="badge-media">動画</span><video src="${url}" controls playsinline muted></video>`;
}

/* 画像を長辺 maxPx に縮小して JPEG 化 */
async function compressImage(file, maxPx = MAX_IMG_PX, quality = 0.85){
  try{
    const bmp = await createImageBitmap(file);
    const scale = Math.min(1, maxPx / Math.max(bmp.width, bmp.height));
    if(scale >= 1 && file.type === "image/jpeg" && maxPx === MAX_IMG_PX) return file;
    const cv = document.createElement("canvas");
    cv.width  = Math.max(1, Math.round(bmp.width * scale));
    cv.height = Math.max(1, Math.round(bmp.height * scale));
    cv.getContext("2d").drawImage(bmp, 0, 0, cv.width, cv.height);
    const blob = await new Promise(r=>cv.toBlob(r, "image/jpeg", quality));
    return blob || file;
  }catch(e){ return file; }
}

/* 動画の先頭フレームからサムネイルJPEGを生成（失敗時は null） */
function videoThumb(file){
  return new Promise(resolve=>{
    try{
      const v=document.createElement("video");
      v.muted=true; v.playsInline=true; v.preload="auto";
      v.src=URL.createObjectURL(file);
      const giveup=setTimeout(()=>resolve(null), 5000);
      v.onloadeddata=()=>{ try{ v.currentTime=0.1; }catch(e){} };
      v.onseeked=()=>{
        try{
          const scale=Math.min(1, 480/Math.max(v.videoWidth, v.videoHeight));
          const cv=document.createElement("canvas");
          cv.width=Math.max(1, Math.round(v.videoWidth*scale));
          cv.height=Math.max(1, Math.round(v.videoHeight*scale));
          cv.getContext("2d").drawImage(v, 0, 0, cv.width, cv.height);
          cv.toBlob(b=>{ clearTimeout(giveup); resolve(b); }, "image/jpeg", 0.7);
        }catch(e){ clearTimeout(giveup); resolve(null); }
      };
      v.onerror=()=>{ clearTimeout(giveup); resolve(null); };
    }catch(e){ resolve(null); }
  });
}

/* ---------- 音声入力（撮影メモ／修正メモ 共用） ---------- */
let recog=null, recTarget=null, recBtn=null;
function toggleMic(targetId, btnId){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast("この端末は音声入力に非対応です（キーボードのマイクをご利用ください）", true); return; }
  if(recog){ recog.stop(); return; }   // 稼働中なら停止
  recTarget=$(targetId); recBtn=$(btnId);
  recog = new SR();
  recog.lang="ja-JP"; recog.interimResults=false; recog.continuous=true;
  recog.onresult = ev=>{
    let txt="";
    for(let i=ev.resultIndex;i<ev.results.length;i++)
      if(ev.results[i].isFinal) txt+=ev.results[i][0].transcript;
    if(txt && recTarget){
      recTarget.value = recTarget.value ? (recTarget.value.replace(/\s+$/,"") + " " + txt) : txt;
      recTarget.dispatchEvent(new Event("input"));   // 検索窓なら即絞り込み
    }
  };
  recog.onstart=()=>{ recBtn.classList.add("rec"); };
  const done=()=>{ if(recBtn) recBtn.classList.remove("rec"); recog=null; recTarget=null; recBtn=null; };
  recog.onend=done; recog.onerror=done;
  recog.start();
}

/* ---------- 保存 ---------- */
let lastSaved=null;
async function save(){
  if(!curFile){ toast("先に写真撮影／動画を押してください", true); return; }
  if(!CATS.some(c=>$(c.id).checked)){
    toast("分類にチェックを入れてください", true); return;
  }
  const btn=$("btnSave");
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>保存中…';
  try{
    /* 1) メディア＋サムネイルをアップロード */
    let blob=curFile, ext, thumbBlob=null;
    if(curType==="image"){
      blob=await compressImage(curFile, MAX_IMG_PX, 0.85);
      thumbBlob=await compressImage(curFile, 420, 0.7);   // 一覧用サムネイル
      ext="jpg";
    }else{
      ext=(curFile.name.split(".").pop()||"mp4").toLowerCase();
      thumbBlob=await videoThumb(curFile);                 // 動画は先頭フレーム
    }
    const now=new Date();
    const base=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,"0")}/${now.getTime()}`;
    const path=`${base}.${ext}`;
    const up=await sb(`/storage/v1/object/${BUCKET}/${path}`,{
      method:"POST",
      headers:{"Content-Type": blob.type || (curType==="image"?"image/jpeg":"video/mp4")},
      body: blob
    });
    if(!up.ok) throw new Error("アップロード失敗: "+await up.text());

    let thumbPath=null;
    if(thumbBlob){
      thumbPath=`${base}_t.jpg`;
      const upT=await sb(`/storage/v1/object/${BUCKET}/${thumbPath}`,{
        method:"POST", headers:{"Content-Type":"image/jpeg"}, body:thumbBlob
      });
      if(!upT.ok) thumbPath=null;   // サムネ失敗は本体保存を妨げない
    }

    /* 2) レコード INSERT */
    const rec={
      media_path: path,
      media_type: curType,
      thumb_path: thumbPath,
      latitude:  curPos ? curPos.lat : null,
      longitude: curPos ? curPos.lon : null,
      memo: $("memo").value.trim()
    };
    CATS.forEach(c=>rec[c.key]=$(c.id).checked);
    const ins=await sb(`/rest/v1/${TABLE}`,{
      method:"POST",
      headers:{"Content-Type":"application/json","Prefer":"return=representation"},
      body: JSON.stringify(rec)
    });
    if(!ins.ok) throw new Error("DB保存失敗: "+await ins.text());
    const row=(await ins.json())[0];
    lastSaved=row;

    /* 3) 住所付与（サーバー側・待たない） */
    if(row.latitude!=null){
      sb(`/functions/v1/${GEOCODE_FN}`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({id:row.id, lat:row.latitude, lon:row.longitude})
      }).catch(()=>{});
    }

    /* 3.5) AI読み取り（画像のみ・サーバー側・待たない） */
    if(curType==="image"){
      sb(`/functions/v1/ocr`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({id:row.id})
      }).catch(()=>{});
    }

    /* 4) リセット（プレビューは残す） */
    curFile=null; $("fileP").value=""; $("fileV").value="";
    $("memo").value="";
    CATS.forEach(c=>{ $(c.id).checked=false; $(c.id).closest(".cat").classList.remove("on"); });
    listLoaded=false;
    toast("保存しました");
  }catch(e){
    console.error(e);
    toast("保存に失敗しました。通信環境を確認して再度お試しください", true);
  }finally{
    btn.disabled=false; btn.textContent="保存";
  }
}

let rows=[], listLoaded=false, meiboMap={};
async function loadList(force){
  if(listLoaded && !force) return;
  $("countLine").textContent="読み込み中…";
  try{
    const res=await sb(`/rest/v1/${TABLE}?select=*&order=created_at.desc&limit=500`);
    if(!res.ok) throw new Error(await res.text());
    rows=await res.json();
    /* 名簿（名刺のAI抽出結果）も取得して検索対象に含める */
    try{
      const cols=["poster_id","氏名","会社団体","役職","住所","電話","メール","備考"]
        .map(encodeURIComponent).join(",");
      const mres=await sb(`/rest/v1/meibo?select=${cols}&limit=3000`);
      if(mres.ok){
        meiboMap={};
        (await mres.json()).forEach(m=>{
          const t=[m.氏名,m.会社団体,m.役職,m.住所,m.電話,m.メール,m.備考].filter(Boolean).join(" ");
          if(m.poster_id) meiboMap[m.poster_id]=((meiboMap[m.poster_id]||"")+" "+t).trim();
        });

    renderList();
    if(map) renderMarkers();
  }catch(e){
    console.error(e);
    $("countLine").textContent="";
    toast("一覧の取得に失敗しました", true);
  }
}
function renderList(){
  const q=$("q").value.trim().toLowerCase();
  const terms=q? q.split(/\s+/):[];
  const list=rows.filter(r=>{
    if(!terms.length) return true;
    const hay=[ r.memo||"", r.address||"", r.postal_code||"", r.person_name||"", r.ocr_text||"", meiboMap[r.id]||"", fmtDT(r.created_at), catText(r) ].join(" ").toLowerCase();
    return terms.every(t=>hay.includes(t));
  });
  $("countLine").textContent=`${list.length} 件${q?`（検索: ${q}）`:""}`;
  $("emptyMsg").style.display=list.length? "none":"block";
  $("grid").innerHTML=list.map(r=>{
    /* サムネイル優先。旧データ（thumb_path無し）は従来表示にフォールバック */
    let inner;
    if(r.thumb_path){
      inner=`<img class="thumb" src="${pubUrl(r.thumb_path)}" loading="lazy">`;
    }else if(r.media_type==="video"){
      inner=`<video class="thumb" src="${pubUrl(r.media_path)}#t=0.1" preload="metadata" muted playsinline></video>`;
    }else{
      inner=`<img class="thumb" src="${pubUrl(r.media_path)}" loading="lazy">`;
    }
    const thumb = r.media_type==="video"
      ? `<div class="thumb-wrap"><span class="vbadge">&#9654; 動画</span>${inner}</div>`
      : inner;
    return `<div class="card" onclick="openDetail('${r.id}')">
      ${thumb}
      <div class="meta">
        <div class="dt">${fmtDT(r.created_at)}</div>
        <div class="addr">${r.address? escapeHtml(r.address) : "（住所 取得待ち）"}</div>
        <div class="memo1">${escapeHtml((r.memo||"").split("\n")[0]) || "&nbsp;"}</div>
        <div class="tags">${catTags(r)}</div>
      </div>
    </div>`;
  }).join("");
}

let map=null, markerLayer=null, mapFilter="all", didFit=false;

function initMap(){
  if(map){ setTimeout(()=>map.invalidateSize(), 60); return; }
  buildLegend();
  map = L.map("map", {zoomControl:true});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
  markerLayer = L.layerGroup().addTo(map);
  // 初期表示：現在地があればそこ、なければ東京駅付近
  if(curPos) map.setView([curPos.lat, curPos.lon], 14);
  else map.setView([35.681, 139.767], 12);
  setTimeout(()=>map.invalidateSize(), 60);
  renderMarkers();
}

function buildLegend(){
  const lg=$("legend");
  const chips=[...CATS.map(c=>({key:c.key,label:c.label,color:c.color})),
               {key:"all",label:"全部",color:ALL_COLOR}];
  lg.innerHTML=chips.map(c=>
    `<div class="lg${c.key===mapFilter?" active":""}" data-key="${c.key}" onclick="setMapFilter('${c.key}')">
       <span class="sw" style="background:${c.color}"></span>${c.label}
     </div>`).join("");
}

function setMapFilter(key){
  mapFilter=key;
  buildLegend();
  didFit=false;           // 絞り込み変更時は旗の範囲にズームし直す
  renderMarkers();
}

function pinIcon(color){
  return L.divIcon({
    className:"pin-ico",
    html:`<svg width="26" height="36" viewBox="0 0 26 36" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 1C6.4 1 1 6.4 1 13c0 8.8 12 22 12 22s12-13.2 12-22C25 6.4 19.6 1 13 1z"
                  fill="${color}" stroke="#fff" stroke-width="1.6"/>
            <circle cx="13" cy="13" r="4.4" fill="#fff"/>
          </svg>`,
    iconSize:[26,36], iconAnchor:[13,35]
  });
}

function primaryColor(r){
  const c=CATS.find(c=>r[c.key]);
  return c? c.color : ALL_COLOR;
}

function renderMarkers(){
  if(!map || !markerLayer) return;
  markerLayer.clearLayers();
  const list=rows.filter(r=>
    r.latitude!=null && r.longitude!=null &&
    (mapFilter==="all" || r[mapFilter])
  );
  const pts=[];
  list.forEach(r=>{
    const color = mapFilter==="all" ? primaryColor(r) : (CATS.find(c=>c.key===mapFilter)||{}).color || ALL_COLOR;
    const m=L.marker([r.latitude, r.longitude], {icon:pinIcon(color)});
    m.on("click", ()=>openDetail(r.id));   // 旗クリック → 選挙情報管理画面
    markerLayer.addLayer(m);
    pts.push([r.latitude, r.longitude]);
  });
  const flabel = mapFilter==="all" ? "全部" : (CATS.find(c=>c.key===mapFilter)||{}).label;
  $("mapCount").textContent=`${flabel}: ${list.length} 件（旗をタップすると詳細・修正画面が開きます）`;
  if(pts.length && !didFit){
    map.fitBounds(pts, {padding:[36,36], maxZoom:16});
    didFit=true;
  }
}

/* ---------- 画像拡大ビューア（ピンチ・パン・ダブルタップ） ---------- */
const zoomEl=$("zoom"), zoomImg=$("zoomImg");
let zs=1, zx=0, zy=0;                 // scale / translate
const ptrs=new Map();
let gStart=null, lastTap=0;

function applyZoom(){ zoomImg.style.transform=`translate(${zx}px,${zy}px) scale(${zs})`; }
function openZoom(url){
  zs=1; zx=0; zy=0; applyZoom();
  zoomImg.src=url;
  zoomEl.classList.add("show");
}
function closeZoom(){ zoomEl.classList.remove("show"); zoomImg.src=""; }

zoomEl.addEventListener("pointerdown", e=>{
  if(e.target.id==="zoomClose") return;
  zoomEl.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(ptrs.size===1){
    const now=Date.now();
    if(now-lastTap<300){                       // ダブルタップで等倍⇔2.5倍
      if(zs>1){ zs=1; zx=0; zy=0; }
      else{
        zs=2.5;
        zx=e.clientX-(e.clientX-zx)*2.5;
        zy=e.clientY-(e.clientY-zy)*2.5;
      }
      applyZoom();
    }
    lastTap=now;
  }
  snapGesture();
});
zoomEl.addEventListener("pointermove", e=>{
  if(!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(!gStart) return;
  const pts=[...ptrs.values()];
  if(pts.length>=2){
    const d=Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
    const mx=(pts[0].x+pts[1].x)/2, my=(pts[0].y+pts[1].y)/2;
    const ns=Math.min(6, Math.max(1, gStart.s * d/gStart.d));
    const k=ns/gStart.s;
    zs=ns;
    zx=mx - k*(gStart.mx - gStart.x);   // 2本指の中点を基準に拡大＋移動
    zy=my - k*(gStart.my - gStart.y);
    applyZoom();
  }else if(pts.length===1 && zs>1){
    zx=gStart.x + (pts[0].x-gStart.mx);
    zy=gStart.y + (pts[0].y-gStart.my);
    applyZoom();
  }
});
function endPtr(e){
  ptrs.delete(e.pointerId);
  if(zs<=1.02){ zs=1; zx=0; zy=0; applyZoom(); }
  snapGesture();
}
zoomEl.addEventListener("pointerup", endPtr);
zoomEl.addEventListener("pointercancel", endPtr);
function snapGesture(){
  const pts=[...ptrs.values()];
  if(pts.length>=2){
    gStart={
      d:Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y),
      mx:(pts[0].x+pts[1].x)/2, my:(pts[0].y+pts[1].y)/2,
      s:zs, x:zx, y:zy
    };
  }else if(pts.length===1){
    gStart={mx:pts[0].x, my:pts[0].y, s:zs, x:zx, y:zy};
  }else{
    gStart=null;
  }
}
/* PCでも確認できるようホイールで拡大縮小 */
zoomEl.addEventListener("wheel", e=>{
  e.preventDefault();
  const ns=Math.min(6, Math.max(1, zs*(e.deltaY<0?1.15:0.87)));
  const k=ns/zs;
  zx=e.clientX - k*(e.clientX-zx);
  zy=e.clientY - k*(e.clientY-zy);
  zs=ns;
  if(zs<=1.02){ zs=1; zx=0; zy=0; }
  applyZoom();
},{passive:false});

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
