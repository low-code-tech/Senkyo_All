<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ポスター管理</title>
<style>
  :root{
    --navy:#1F3864; --navy2:#2E5496; --bg:#EEF2F8; --card:#FFFFFF;
    --line:#C8D2E4; --text:#1A2333; --sub:#5A6B8C; --red:#B5403B; --green:#2E7D52;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    background:var(--bg); color:var(--text); font-size:15px;
    padding-bottom:env(safe-area-inset-bottom);
  }
  /* ===== ヘッダー ===== */
  header{
    position:sticky; top:0; z-index:50;
    background:var(--navy); color:#fff;
    display:flex; align-items:center; gap:8px;
    padding:10px 12px calc(10px);
  }
  header h1{font-size:16px; font-weight:700; letter-spacing:.05em; flex:1;}
  .tab-btn{
    background:transparent; border:1px solid rgba(255,255,255,.5); color:#fff;
    border-radius:6px; padding:7px 14px; font-size:13px; font-weight:700;
  }
  .tab-btn.active{background:#fff; color:var(--navy); border-color:#fff;}

  main{max-width:560px; margin:0 auto; padding:12px;}
  .view{display:none;}
  .view.show{display:block;}

  /* ===== 撮影画面 ===== */
  .shoot-top{display:flex; gap:8px; margin-bottom:10px;}
  .btn{
    border:none; border-radius:8px; font-weight:700; font-size:15px;
    padding:13px 14px; cursor:pointer; color:#fff; background:var(--navy);
  }
  .btn:active{opacity:.8;}
  .btn.sub{background:#fff; color:var(--navy); border:1.5px solid var(--navy); font-size:13px; padding:10px 12px;}
  .btn.wide{flex:1;}
  .btn:disabled{opacity:.45;}

  .preview{
    background:#DDE3EE; border:1px solid var(--line); border-radius:10px;
    width:100%; aspect-ratio:4/3; overflow:hidden;
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .preview img,.preview video{width:100%; height:100%; object-fit:contain; background:#000;}
  .preview .ph{color:#9AA8C4; text-align:center; font-size:13px; line-height:1.7;}
  .preview .ph .ico{font-size:44px; display:block;}
  .badge-media{
    position:absolute; top:8px; left:8px; background:rgba(31,56,100,.85);
    color:#fff; font-size:11px; font-weight:700; padding:3px 8px; border-radius:99px;
  }
  .gps-line{
    display:flex; align-items:center; gap:6px; margin:8px 2px 10px;
    font-size:12px; color:var(--sub);
  }
  .gps-dot{width:8px; height:8px; border-radius:50%; background:#C0392B;}
  .gps-dot.ok{background:var(--green);}

  .memo-wrap{position:relative; margin-bottom:10px;}
  textarea#memo{
    width:100%; min-height:110px; resize:vertical;
    border:1.5px solid var(--line); border-radius:10px; background:#fff;
    padding:12px 52px 12px 12px; font-size:16px; line-height:1.6; font-family:inherit;
  }
  textarea#memo:focus{outline:2px solid var(--navy2); border-color:var(--navy2);}
  .mic-btn{
    position:absolute; right:8px; top:8px; width:40px; height:40px;
    border-radius:50%; border:1.5px solid var(--navy); background:#fff;
    font-size:19px; color:var(--navy); cursor:pointer;
  }
  .mic-btn.rec{background:var(--red); border-color:var(--red); color:#fff; animation:pulse 1.1s infinite;}
  @keyframes pulse{50%{box-shadow:0 0 0 8px rgba(181,64,59,.25);}}

  .cat-row{display:flex; gap:8px; margin-bottom:12px;}
  .cat{
    flex:1; display:flex; align-items:center; justify-content:center; gap:7px;
    background:#fff; border:1.5px solid var(--line); border-radius:8px;
    padding:12px 4px; font-size:14px; font-weight:700; color:var(--sub); cursor:pointer;
    user-select:none;
  }
  .cat input{width:18px; height:18px; accent-color:var(--navy);}
  .cat.on{border-color:var(--navy); color:var(--navy); background:#E9EFFA;}

  .save-row{display:flex; gap:8px;}
  #btnSave{flex:1; font-size:17px; padding:15px;}

  /* ===== 一覧画面 ===== */
  .search-bar{display:flex; gap:8px; margin-bottom:10px;}
  .search-bar input{
    flex:1; border:1.5px solid var(--line); border-radius:8px; padding:11px 12px;
    font-size:15px; background:#fff;
  }
  .search-bar input:focus{outline:2px solid var(--navy2);}
  .count-line{font-size:12px; color:var(--sub); margin:0 2px 8px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    overflow:hidden; cursor:pointer;
  }
  .card .thumb{width:100%; aspect-ratio:4/3; object-fit:cover; background:#DDE3EE; display:block;}
  .card .meta{padding:7px 8px 8px;}
  .card .dt{font-size:11px; color:var(--navy); font-weight:700;}
  .card .addr{font-size:11px; color:var(--sub); overflow:hidden; white-space:nowrap; text-overflow:ellipsis;}
  .card .memo1{font-size:12px; color:var(--text); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; margin-top:2px;}
  .card .tags{margin-top:4px; display:flex; gap:4px; flex-wrap:wrap;}
  .tag{font-size:10px; font-weight:700; color:#fff; background:var(--navy2); border-radius:99px; padding:2px 7px;}
  .vbadge{position:absolute; margin:6px; background:rgba(0,0,0,.6); color:#fff; font-size:10px; border-radius:4px; padding:2px 6px;}
  .thumb-wrap{position:relative;}
  .empty{color:var(--sub); text-align:center; padding:40px 0; font-size:13px; line-height:1.8;}

  /* ===== モーダル共通 ===== */
  .modal{
    display:none; position:fixed; inset:0; z-index:100;
    background:rgba(20,30,55,.55); padding:14px;
    align-items:center; justify-content:center;
  }
  .modal.show{display:flex;}
  .modal .box{
    background:#fff; border-radius:12px; width:100%; max-width:520px;
    max-height:92dvh; overflow-y:auto; padding:14px;
  }
  .modal .box h2{
    font-size:15px; color:var(--navy); border-bottom:2px solid var(--navy);
    padding-bottom:8px; margin-bottom:10px; display:flex; align-items:center;
  }
  .modal .box h2 .x{margin-left:auto; border:none; background:none; font-size:20px; color:var(--sub); cursor:pointer;}
  .modal .media{width:100%; max-height:52dvh; object-fit:contain; background:#000; border-radius:8px; display:block;}
  .detail-meta{font-size:12px; color:var(--sub); margin:8px 2px; line-height:1.8;}
  .modal textarea{
    width:100%; min-height:90px; border:1.5px solid var(--line); border-radius:8px;
    padding:10px; font-size:15px; font-family:inherit; line-height:1.6;
  }
  .modal .cat-row{margin:10px 0;}
  .modal .actions{display:flex; gap:8px; margin-top:8px;}
  .btn.danger{background:#fff; color:var(--red); border:1.5px solid var(--red);}

  /* トースト */
  #toast{
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%);
    background:var(--navy); color:#fff; font-size:14px; font-weight:700;
    padding:11px 20px; border-radius:99px; z-index:200; display:none;
    box-shadow:0 4px 16px rgba(0,0,0,.25); max-width:88%; text-align:center;
  }
  #toast.err{background:var(--red);}
  #toast.show{display:block;}

  /* パスコード */
  #gate{position:fixed; inset:0; z-index:300; background:var(--navy);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; padding:20px;}
  #gate h1{color:#fff; font-size:18px; letter-spacing:.1em;}
  #gate input{font-size:20px; padding:12px; border-radius:8px; border:none; text-align:center; width:220px; letter-spacing:.2em;}
  #gate button{font-size:15px;}
  #gate .msg{color:#FFC7C2; font-size:13px; min-height:1.2em;}

  .spinner{
    display:inline-block; width:15px; height:15px; border:2.5px solid rgba(255,255,255,.4);
    border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- ===== 簡易パスコードゲート ===== -->
<div id="gate">
  <h1>ポスター管理</h1>
  <input id="gateInput" type="password" inputmode="numeric" placeholder="パスコード" autocomplete="off">
  <button class="btn" onclick="checkGate()">開く</button>
  <div class="msg" id="gateMsg"></div>
</div>

<header>
  <h1>ポスター管理</h1>
  <button class="tab-btn active" id="tabShoot" onclick="switchView('shoot')">撮影</button>
  <button class="tab-btn" id="tabList" onclick="switchView('list')">一覧</button>
</header>

<main>
  <!-- ===== 撮影ビュー ===== -->
  <section id="viewShoot" class="view show">
    <div class="shoot-top">
      <button class="btn wide" onclick="pickMedia('photo')">&#128247; 撮影ボタン ※横向きで</button>
      <button class="btn sub" onclick="pickMedia('video')">&#127909; 動画</button>
      <button class="btn sub" onclick="openConfirm()">確認</button>
    </div>
    <input type="file" id="fileP" accept="image/*" capture="environment" hidden>
    <input type="file" id="fileV" accept="video/*" capture="environment" hidden>

    <div class="preview" id="preview">
      <div class="ph"><span class="ico">&#9968;</span>撮影ボタンを押して<br>ポスターを撮影してください</div>
    </div>
    <div class="gps-line">
      <span class="gps-dot" id="gpsDot"></span><span id="gpsText">位置情報を取得中…</span>
    </div>

    <div class="memo-wrap">
      <textarea id="memo" placeholder="メモ（場所の目印・状態など）"></textarea>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="音声入力">&#127908;</button>
    </div>

    <div class="cat-row" id="catRow">
      <label class="cat"><input type="checkbox" id="catSano">佐野</label>
      <label class="cat"><input type="checkbox" id="catOther">他候補</label>
      <label class="cat"><input type="checkbox" id="catMisc">その他</label>
    </div>

    <div class="save-row">
      <button class="btn" id="btnSave" onclick="save()">保存</button>
    </div>
  </section>

  <!-- ===== 一覧ビュー ===== -->
  <section id="viewList" class="view">
    <div class="search-bar">
      <input id="q" placeholder="メモ・日時・住所のフリー検索（例：2026/07 交差点）" oninput="renderList()">
      <button class="btn sub" onclick="loadList(true)">更新</button>
    </div>
    <div class="count-line" id="countLine"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="emptyMsg" style="display:none;">データがありません。<br>撮影タブから保存してください。</div>
  </section>
</main>

<!-- ===== 直前分・確認モーダル ===== -->
<div class="modal" id="mConfirm">
  <div class="box">
    <h2>直前の保存分 <button class="x" onclick="closeModal('mConfirm')">&#10005;</button></h2>
    <div id="confirmBody"></div>
  </div>
</div>

<!-- ===== 詳細・修正モーダル ===== -->
<div class="modal" id="mDetail">
  <div class="box">
    <h2>修正・追加 <button class="x" onclick="closeModal('mDetail')">&#10005;</button></h2>
    <div id="detailMedia"></div>
    <div class="detail-meta" id="detailMeta"></div>
    <textarea id="editMemo"></textarea>
    <div class="cat-row">
      <label class="cat"><input type="checkbox" id="eSano">佐野</label>
      <label class="cat"><input type="checkbox" id="eOther">他候補</label>
      <label class="cat"><input type="checkbox" id="eMisc">その他</label>
    </div>
    <div class="actions">
      <button class="btn wide" onclick="updateRecord()">修正を保存</button>
      <button class="btn danger" onclick="deleteRecord()">削除</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ================================================================
   設定（デプロイ時にここだけ書き換える）
================================================================ */
const SUPABASE_URL      = "https://oxekrlgsfkhjaqssrzvk.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_jXTK6ilznGBS-BEx8Ibcfw_kqOQhrv7";
const BUCKET            = "poster-media";                        // ストレージバケット名
const TABLE             = "posters";                             // テーブル名
const PASSCODE          = "sano2026";                            // 簡易パスコード（""で無効化）
const GEOCODE_FN        = "geocode";                             // Edge Function 名
const MAX_IMG_PX        = 1600;                                  // 画像長辺の上限（自動縮小）
/* ================================================================ */

const $ = id => document.getElementById(id);
const sb = (path, opt={}) => fetch(SUPABASE_URL + path, {
  ...opt,
  headers: {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    ...(opt.headers||{})
  }
});
const pubUrl = p => `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${p}`;

/* ---------- パスコード ---------- */
function checkGate(){
  if($("gateInput").value === PASSCODE){
    localStorage.setItem("poster_gate","ok");
    $("gate").style.display="none";
  }else{
    $("gateMsg").textContent="パスコードが違います";
  }
}
if(!PASSCODE || localStorage.getItem("poster_gate")==="ok"){
  $("gate").style.display="none";
}
$("gateInput").addEventListener("keydown", e=>{ if(e.key==="Enter") checkGate(); });

/* ---------- トースト ---------- */
let toastTimer;
function toast(msg, err){
  const t=$("toast");
  t.textContent=msg; t.className= err ? "err show" : "show";
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"), 2600);
}

/* ---------- タブ切替 ---------- */
function switchView(v){
  $("viewShoot").classList.toggle("show", v==="shoot");
  $("viewList").classList.toggle("show", v==="list");
  $("tabShoot").classList.toggle("active", v==="shoot");
  $("tabList").classList.toggle("active", v==="list");
  if(v==="list" && !listLoaded) loadList(true);
}

/* ---------- 位置情報（起動時から先読み） ---------- */
let curPos=null;
function watchGPS(){
  if(!navigator.geolocation){ $("gpsText").textContent="この端末は位置情報に非対応です"; return; }
  navigator.geolocation.watchPosition(
    p=>{
      curPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
      $("gpsDot").classList.add("ok");
      $("gpsText").textContent=`位置情報 取得済（精度 約${Math.round(p.coords.accuracy)}m）`;
    },
    e=>{ $("gpsText").textContent="位置情報が取得できません（設定で許可してください）"; },
    {enableHighAccuracy:true, maximumAge:15000, timeout:20000}
  );
}
watchGPS();

/* ---------- 撮影・プレビュー ---------- */
let curFile=null, curType="image";
function pickMedia(kind){ (kind==="photo" ? $("fileP") : $("fileV")).click(); }
$("fileP").addEventListener("change", e=>setMedia(e.target.files[0], "image"));
$("fileV").addEventListener("change", e=>setMedia(e.target.files[0], "video"));

function setMedia(f, type){
  if(!f) return;
  curFile=f; curType=type;
  const url=URL.createObjectURL(f);
  $("preview").innerHTML = type==="image"
    ? `<span class="badge-media">写真</span><img src="${url}">`
    : `<span class="badge-media">動画</span><video src="${url}" controls playsinline muted></video>`;
}

/* 画像を長辺 MAX_IMG_PX に縮小して JPEG 化（通信量・容量削減） */
async function compressImage(file){
  try{
    const bmp = await createImageBitmap(file);
    const scale = Math.min(1, MAX_IMG_PX / Math.max(bmp.width, bmp.height));
    if(scale >= 1 && file.type === "image/jpeg") return file;
    const cv = document.createElement("canvas");
    cv.width  = Math.round(bmp.width * scale);
    cv.height = Math.round(bmp.height * scale);
    cv.getContext("2d").drawImage(bmp, 0, 0, cv.width, cv.height);
    const blob = await new Promise(r=>cv.toBlob(r, "image/jpeg", 0.85));
    return blob || file;
  }catch(e){ return file; }   // 失敗時は元ファイルのまま
}

/* ---------- 音声入力 ---------- */
let recog=null, recOn=false;
function toggleMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast("この端末は音声入力に非対応です（キーボードのマイクをご利用ください）", true); return; }
  if(recOn){ recog.stop(); return; }
  recog = new SR();
  recog.lang="ja-JP"; recog.interimResults=false; recog.continuous=true;
  recog.onresult = ev=>{
    let txt="";
    for(let i=ev.resultIndex;i<ev.results.length;i++)
      if(ev.results[i].isFinal) txt+=ev.results[i][0].transcript;
    if(txt){
      const m=$("memo");
      m.value = m.value ? (m.value.replace(/\s+$/,"") + " " + txt) : txt;
    }
  };
  recog.onstart=()=>{ recOn=true; $("micBtn").classList.add("rec"); };
  recog.onend  =()=>{ recOn=false; $("micBtn").classList.remove("rec"); };
  recog.onerror=()=>{ recOn=false; $("micBtn").classList.remove("rec"); };
  recog.start();
}

/* ---------- チェックボックス見た目 ---------- */
document.querySelectorAll(".cat input").forEach(cb=>{
  cb.addEventListener("change", ()=>cb.closest(".cat").classList.toggle("on", cb.checked));
});

/* ---------- 保存 ---------- */
let lastSaved=null;
async function save(){
  if(!curFile){ toast("先に撮影してください", true); return; }
  if(!$("catSano").checked && !$("catOther").checked && !$("catMisc").checked){
    toast("種別にチェックを入れてください", true); return;   // 旧アプリの区チェック必須を踏襲
  }
  const btn=$("btnSave");
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>保存中…';
  try{
    /* 1) メディアをアップロード */
    let blob=curFile, ext;
    if(curType==="image"){ blob=await compressImage(curFile); ext="jpg"; }
    else{ ext=(curFile.name.split(".").pop()||"mp4").toLowerCase(); }
    const now=new Date();
    const path=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,"0")}/${now.getTime()}.${ext}`;
    const up=await sb(`/storage/v1/object/${BUCKET}/${path}`,{
      method:"POST",
      headers:{"Content-Type": blob.type || (curType==="image"?"image/jpeg":"video/mp4")},
      body: blob
    });
    if(!up.ok) throw new Error("アップロード失敗: "+await up.text());

    /* 2) レコード INSERT（緯度経度・チェック値・メモ・日時） */
    const rec={
      media_path: path,
      media_type: curType,
      latitude:  curPos ? curPos.lat : null,
      longitude: curPos ? curPos.lon : null,
      memo: $("memo").value.trim(),
      cat_sano:  $("catSano").checked,
      cat_other: $("catOther").checked,
      cat_misc:  $("catMisc").checked
    };
    const ins=await sb(`/rest/v1/${TABLE}`,{
      method:"POST",
      headers:{"Content-Type":"application/json","Prefer":"return=representation"},
      body: JSON.stringify(rec)
    });
    if(!ins.ok) throw new Error("DB保存失敗: "+await ins.text());
    const row=(await ins.json())[0];
    lastSaved=row;

    /* 3) 住所付与はサーバー側（Edge Function）に依頼して待たない */
    if(row.latitude!=null){
      sb(`/functions/v1/${GEOCODE_FN}`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({id:row.id, lat:row.latitude, lon:row.longitude})
      }).catch(()=>{});
    }

    /* 4) リセット（プレビューは残して確認しやすく） */
    curFile=null; $("fileP").value=""; $("fileV").value="";
    $("memo").value="";
    ["catSano","catOther","catMisc"].forEach(id=>{
      $(id).checked=false; $(id).closest(".cat").classList.remove("on");
    });
    listLoaded=false;
    toast("保存しました");
  }catch(e){
    console.error(e);
    toast("保存に失敗しました。通信環境を確認して再度お試しください", true);
  }finally{
    btn.disabled=false; btn.textContent="保存";
  }
}

/* ---------- 確認（直前の保存分ポップアップ） ---------- */
function openConfirm(){
  const b=$("confirmBody");
  if(!lastSaved){
    b.innerHTML='<div class="empty">この端末での保存はまだありません。<br>（過去分は「一覧」から確認できます）</div>';
  }else{
    const r=lastSaved;
    b.innerHTML = mediaTag(r, "media") + `
      <div class="detail-meta">
        ${fmtDT(r.created_at)}<br>
        ${catText(r)}<br>
        ${r.memo ? escapeHtml(r.memo) : "（メモなし）"}
      </div>`;
  }
  $("mConfirm").classList.add("show");
}
function closeModal(id){ $(id).classList.remove("show"); }
document.querySelectorAll(".modal").forEach(m=>{
  m.addEventListener("click", e=>{ if(e.target===m) m.classList.remove("show"); });
});

/* ---------- 一覧 ---------- */
let rows=[], listLoaded=false;
async function loadList(force){
  if(listLoaded && !force) return;
  $("countLine").textContent="読み込み中…";
  try{
    const res=await sb(`/rest/v1/${TABLE}?select=*&order=created_at.desc&limit=500`);
    if(!res.ok) throw new Error(await res.text());
    rows=await res.json();
    listLoaded=true;
    renderList();
  }catch(e){
    console.error(e);
    $("countLine").textContent="";
    toast("一覧の取得に失敗しました", true);
  }
}
function renderList(){
  const q=$("q").value.trim().toLowerCase();
  const terms=q? q.split(/\s+/):[];
  const list=rows.filter(r=>{
    if(!terms.length) return true;
    const hay=[ r.memo||"", r.address||"", fmtDT(r.created_at), catText(r) ].join(" ").toLowerCase();
    return terms.every(t=>hay.includes(t));
  });
  $("countLine").textContent=`${list.length} 件${q?`（検索: ${q}）`:""}`;
  $("emptyMsg").style.display=list.length? "none":"block";
  $("grid").innerHTML=list.map(r=>{
    const thumb = r.media_type==="video"
      ? `<div class="thumb-wrap"><span class="vbadge">&#9654; 動画</span><video class="thumb" src="${pubUrl(r.media_path)}#t=0.1" preload="metadata" muted playsinline></video></div>`
      : `<img class="thumb" src="${pubUrl(r.media_path)}" loading="lazy">`;
    return `<div class="card" onclick="openDetail('${r.id}')">
      ${thumb}
      <div class="meta">
        <div class="dt">${fmtDT(r.created_at)}</div>
        <div class="addr">${r.address? escapeHtml(r.address) : "（住所 取得待ち）"}</div>
        <div class="memo1">${escapeHtml((r.memo||"").split("\n")[0]) || "&nbsp;"}</div>
        <div class="tags">${catTags(r)}</div>
      </div>
    </div>`;
  }).join("");
}

/* ---------- 詳細・修正 ---------- */
let editId=null;
function openDetail(id){
  const r=rows.find(x=>x.id===id); if(!r) return;
  editId=id;
  $("detailMedia").innerHTML=mediaTag(r,"media");
  $("detailMeta").innerHTML=
    `${fmtDT(r.created_at)}<br>` +
    `${r.address? escapeHtml(r.address):"住所 取得待ち"}` +
    (r.latitude!=null? ` ／ <a href="https://www.google.com/maps?q=${r.latitude},${r.longitude}" target="_blank" rel="noopener">地図で開く</a>`:"");
  $("editMemo").value=r.memo||"";
  setCat("eSano",r.cat_sano); setCat("eOther",r.cat_other); setCat("eMisc",r.cat_misc);
  $("mDetail").classList.add("show");
}
function setCat(id,on){ const cb=$(id); cb.checked=!!on; cb.closest(".cat").classList.toggle("on",!!on); }

async function updateRecord(){
  if(!editId) return;
  const body={
    memo:$("editMemo").value.trim(),
    cat_sano:$("eSano").checked, cat_other:$("eOther").checked, cat_misc:$("eMisc").checked
  };
  const res=await sb(`/rest/v1/${TABLE}?id=eq.${editId}`,{
    method:"PATCH",
    headers:{"Content-Type":"application/json","Prefer":"return=representation"},
    body:JSON.stringify(body)
  });
  if(res.ok){
    const upd=(await res.json())[0];
    rows=rows.map(r=>r.id===editId? upd:r);
    renderList(); closeModal("mDetail"); toast("修正を保存しました");
  }else{
    toast("修正に失敗しました", true);
  }
}
async function deleteRecord(){
  if(!editId) return;
  if(!confirm("この記録を削除します。よろしいですか？")) return;
  const r=rows.find(x=>x.id===editId);
  const res=await sb(`/rest/v1/${TABLE}?id=eq.${editId}`,{method:"DELETE"});
  if(res.ok){
    if(r) sb(`/storage/v1/object/${BUCKET}/${r.media_path}`,{method:"DELETE"}).catch(()=>{});
    rows=rows.filter(x=>x.id!==editId);
    renderList(); closeModal("mDetail"); toast("削除しました");
  }else{
    toast("削除に失敗しました", true);
  }
}

/* ---------- ユーティリティ ---------- */
function fmtDT(iso){
  const d=new Date(iso);
  const z=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}/${z(d.getMonth()+1)}/${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}`;
}
function catText(r){
  const a=[]; if(r.cat_sano)a.push("佐野"); if(r.cat_other)a.push("他候補"); if(r.cat_misc)a.push("その他");
  return a.join("・")||"（種別なし）";
}
function catTags(r){
  const a=[]; if(r.cat_sano)a.push("佐野"); if(r.cat_other)a.push("他候補"); if(r.cat_misc)a.push("その他");
  return a.map(t=>`<span class="tag">${t}</span>`).join("");
}
function mediaTag(r, cls){
  return r.media_type==="video"
    ? `<video class="${cls}" src="${pubUrl(r.media_path)}" controls playsinline></video>`
    : `<img class="${cls}" src="${pubUrl(r.media_path)}">`;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
