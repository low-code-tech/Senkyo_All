<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F3864">
<link rel="apple-touch-icon" href="/receipt-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/receipt-192.png">
<link rel="manifest" href="/manifest-receipt.json">
<title>領収書</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
<style>
  :root{
    --navy:#1F3864; --navy2:#2E5496; --bg:#EEF2F8; --card:#FFFFFF;
    --line:#C8D2E4; --text:#1A2333; --sub:#5A6B8C; --red:#B5403B; --green:#2E7D52;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    background:var(--bg); color:var(--text); font-size:15px;
    padding-top:var(--hh,56px); padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    position:fixed; top:0; left:0; right:0; z-index:50;
    background:var(--navy); display:flex; align-items:center; gap:6px; padding:8px 10px;
  }
  .hbtn{
    flex:1; border:1px solid rgba(255,255,255,.55); background:transparent; color:#fff;
    border-radius:8px; padding:11px 2px; font-size:13.5px; font-weight:700; cursor:pointer; white-space:nowrap;
  }
  .hbtn:active{opacity:.75;}
  .hbtn.primary{background:#fff; color:var(--navy); border-color:#fff; flex:1.35;}
  .hbtn.active{background:var(--navy2); border-color:var(--navy2);}

  main{max-width:560px; margin:0 auto; padding:10px 12px;}
  .view{display:none;}
  .view.show{display:block;}
  .btn{border:none; border-radius:8px; font-weight:700; font-size:15px;
    padding:13px 14px; cursor:pointer; color:#fff; background:var(--navy);}
  .btn:active{opacity:.8;}
  .btn.sub{background:#fff; color:var(--navy); border:1.5px solid var(--navy); font-size:13px; padding:10px 12px;}
  .btn.wide{flex:1;}
  .btn:disabled{opacity:.45;}

  .preview{
    background:#DDE3EE; border:1px solid var(--line); border-radius:10px;
    width:100%; aspect-ratio:3/4; max-height:42dvh; overflow:hidden;
    display:flex; align-items:center; justify-content:center; position:relative; margin:0 auto;
  }
  .preview img{width:100%; height:100%; object-fit:contain; background:#000;}
  .preview .ph{color:#9AA8C4; text-align:center; font-size:13px; line-height:1.7;}
  .preview .ph .ico{font-size:44px; display:block;}

  .who-row{display:flex; align-items:center; gap:8px; margin:8px 0;}
  .who-row label{font-size:12.5px; font-weight:700; color:var(--navy); flex:none;}
  .who-row input{
    flex:1; border:1.5px solid var(--line); border-radius:8px; padding:9px 10px; font-size:15px; background:#fff;
  }

  .memo-wrap{position:relative; margin-bottom:10px;}
  .memo-wrap textarea{
    width:100%; min-height:96px; resize:vertical;
    border:1.5px solid var(--line); border-radius:10px; background:#fff;
    padding:12px 52px 12px 12px; font-size:16px; line-height:1.6; font-family:inherit;
  }
  .memo-wrap textarea:focus{outline:2px solid var(--navy2); border-color:var(--navy2);}
  .mic-btn{
    position:absolute; right:8px; top:8px; width:40px; height:40px;
    border-radius:50%; border:1.5px solid var(--navy); background:#fff;
    font-size:19px; color:var(--navy); cursor:pointer;
  }
  .mic-btn.rec{background:var(--red); border-color:var(--red); color:#fff; animation:pulse 1.1s infinite;}
  .mic-btn.inline{position:static; flex:none;}
  @keyframes pulse{50%{box-shadow:0 0 0 8px rgba(181,64,59,.25);}}

  .cat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-bottom:12px;}
  .cat{
    display:flex; align-items:center; justify-content:center;
    background:#fff; border:1.5px solid var(--line); border-radius:8px;
    padding:12px 2px; font-size:13px; font-weight:700; color:var(--sub); cursor:pointer;
    user-select:none; white-space:nowrap;
  }
  .cat.on{border-color:var(--navy); color:#fff; background:var(--navy);}

  .save-row{display:flex; gap:8px;}
  #btnSave{flex:1; font-size:17px; padding:15px;}

  .search-bar{
    display:flex; gap:8px; margin-bottom:8px;
    position:sticky; top:var(--hh,56px); z-index:40; background:var(--bg); padding:8px 0;
  }
  .search-bar input{
    flex:1; border:1.5px solid var(--line); border-radius:8px; padding:11px 12px;
    font-size:15px; background:#fff; min-width:0;
  }
  .export-row{display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap;}
  .count-line{font-size:12px; color:var(--sub); margin:0 2px 8px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; cursor:pointer; position:relative;}
  .card .thumb{width:100%; aspect-ratio:3/4; object-fit:cover; background:#DDE3EE; display:block;}
  .card .meta{padding:7px 8px 8px;}
  .card .dt{font-size:11px; color:var(--navy); font-weight:700;}
  .card .payee{font-size:12.5px; font-weight:700; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;}
  .card .amt{font-size:14px; font-weight:700; color:var(--navy);}
  .card .tags{margin-top:3px; display:flex; gap:4px; flex-wrap:wrap;}
  .tag{font-size:10px; font-weight:700; color:#fff; background:var(--navy2); border-radius:99px; padding:2px 7px;}
  .tag.paid{background:var(--green);}
  .tag.unpaid{background:var(--red);}
  .empty{color:var(--sub); text-align:center; padding:40px 0; font-size:13px; line-height:1.8;}

  /* 集計 */
  .agg-tbl{width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .agg-tbl th,.agg-tbl td{border-bottom:1px solid var(--line); padding:9px 8px; font-size:13px; text-align:left;}
  .agg-tbl th{background:var(--navy); color:#fff; font-size:12px; white-space:nowrap;}
  .agg-tbl td.num{text-align:right; font-weight:700;}
  .paybtn{border:1.5px solid var(--green); background:#fff; color:var(--green);
    border-radius:8px; font-size:12px; font-weight:700; padding:6px 10px; cursor:pointer;}
  .paybtn.done{background:var(--green); color:#fff;}

  .modal{display:none; position:fixed; inset:0; z-index:1200; background:rgba(20,30,55,.55);
    padding:14px; align-items:center; justify-content:center;}
  .modal.show{display:flex;}
  .modal .box{background:#fff; border-radius:12px; width:100%; max-width:520px;
    max-height:92dvh; overflow-y:auto; padding:14px;}
  .modal .box h2{font-size:15px; color:var(--navy); border-bottom:2px solid var(--navy);
    padding-bottom:8px; margin-bottom:10px; display:flex; align-items:center;}
  .modal .box h2 .x{margin-left:auto; border:none; background:none; font-size:20px; color:var(--sub); cursor:pointer;}
  .modal .media{width:100%; max-height:40dvh; object-fit:contain; background:#000; border-radius:8px; display:block; cursor:zoom-in;}
  .frm{display:grid; grid-template-columns:88px 1fr; gap:7px 8px; align-items:center; margin:10px 0;}
  .frm label{font-size:12px; font-weight:700; color:var(--navy);}
  .frm input,.frm select,.frm textarea{
    border:1.5px solid var(--line); border-radius:8px; padding:9px 10px; font-size:15px; background:#fff; width:100%; font-family:inherit;
  }
  .frm .chk{display:flex; gap:16px; align-items:center; font-size:13.5px;}
  .frm .chk input{width:18px; height:18px; accent-color:var(--navy);}
  .ocr-box summary{font-size:12.5px; font-weight:700; color:var(--navy); cursor:pointer;
    padding:8px 10px; background:#E9EFFA; border-radius:8px; user-select:none;}
  .ocr-text{font-size:12.5px; line-height:1.7; white-space:pre-wrap;
    background:#F7F9FD; border:1px solid var(--line); border-radius:8px; padding:10px; margin-top:6px; max-height:150px; overflow-y:auto;}
  .modal .actions{display:flex; gap:8px; margin-top:10px;}
  .btn.danger{background:#fff; color:var(--red); border:1.5px solid var(--red);}

  #toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%);
    background:var(--navy); color:#fff; font-size:14px; font-weight:700;
    padding:11px 20px; border-radius:99px; z-index:1300; display:none;
    box-shadow:0 4px 16px rgba(0,0,0,.25); max-width:88%; text-align:center;}
  #toast.err{background:var(--red);}
  #toast.show{display:block;}

  #gate{position:fixed; inset:0; z-index:1400; background:var(--navy);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; padding:20px;}
  #gate h1{color:#fff; font-size:18px; letter-spacing:.1em;}
  #gate input{font-size:20px; padding:12px; border-radius:8px; border:none; text-align:center; width:220px; letter-spacing:.2em;}
  #gate button{font-size:15px;}
  #gate .msg{color:#FFC7C2; font-size:13px; min-height:1.2em;}
  .spinner{display:inline-block; width:15px; height:15px; border:2.5px solid rgba(255,255,255,.4);
    border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="gate">
  <h1>領収書</h1>
  <input id="gateInput" type="password" inputmode="numeric" placeholder="パスコード" autocomplete="off">
  <button class="btn" onclick="checkGate()">開く</button>
  <div class="msg" id="gateMsg"></div>
</div>

<header>
  <button class="hbtn" onclick="openConfirm()">確認</button>
  <button class="hbtn" id="hList" onclick="switchView('list')">一覧</button>
  <button class="hbtn" id="hAgg" onclick="switchView('agg')">集計</button>
  <button class="hbtn primary" onclick="switchView('shoot'); pickMedia()">&#128247; 写真撮影</button>
</header>

<main>
  <!-- ===== 撮影ビュー ===== -->
  <section id="viewShoot" class="view show">
    <input type="file" id="fileP" accept="image/*" capture="environment" hidden>
    <div class="preview" id="preview">
      <div class="ph"><span class="ico">&#129534;</span>上の「写真撮影」を押して<br>領収書を撮影してください</div>
    </div>
    <div class="who-row">
      <label>支出者</label>
      <input id="who" placeholder="あなたの氏名（立替金の返金先）">
    </div>
    <div class="memo-wrap">
      <textarea id="memo" placeholder="支出理由などをメモ（音声入力できます）&#10;※金額・日付・支払先はAIが自動で読み取ります"></textarea>
      <button class="mic-btn" id="micMemo" onclick="toggleMic('memo','micMemo')" title="音声入力">&#127908;</button>
    </div>
    <div class="cat-grid" id="catGrid"></div>
    <div class="save-row">
      <button class="btn" id="btnSave" onclick="save()">保存</button>
    </div>
  </section>

  <!-- ===== 一覧ビュー ===== -->
  <section id="viewList" class="view">
    <div class="search-bar">
      <input id="q" placeholder="支払先・適用・支出者などのフリー検索" oninput="renderList()">
      <button class="mic-btn inline" id="micSearch" onclick="toggleMic('q','micSearch')" title="音声入力">&#127908;</button>
      <button class="btn sub" onclick="loadList(true)">検索</button>
    </div>
    <div class="export-row">
      <button class="btn sub" onclick="pickBaseXml()">会計帳簿XML出力（元XMLに明細追記）</button>
      <button class="btn sub" onclick="exportCsv()">CSV出力</button>
      <input type="file" id="baseXml" accept=".xml" hidden>
    </div>
    <div class="count-line" id="countLine"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="emptyMsg" style="display:none;">データがありません。<br>「写真撮影」から保存してください。</div>
  </section>

  <!-- ===== 集計ビュー（支出者別×月別・立替金返金管理） ===== -->
  <section id="viewAgg" class="view">
    <div class="count-line" style="margin-top:6px;">支出者別・月別の立替金集計（「返金済にする」でその月の明細を一括チェック）</div>
    <table class="agg-tbl">
      <thead><tr><th>支出者</th><th>月</th><th>件数</th><th>合計</th><th>未返金</th><th></th></tr></thead>
      <tbody id="aggBody"></tbody>
    </table>
    <div class="empty" id="aggEmpty" style="display:none;">データがありません。</div>
  </section>
</main>

<!-- 確認モーダル -->
<div class="modal" id="mConfirm">
  <div class="box">
    <h2>直前の保存分 <button class="x" onclick="closeModal('mConfirm')">&#10005;</button></h2>
    <div id="confirmBody"></div>
  </div>
</div>

<!-- 詳細・修正モーダル -->
<div class="modal" id="mDetail">
  <div class="box">
    <h2>領収書の確認・修正 <button class="x" onclick="closeModal('mDetail')">&#10005;</button></h2>
    <div id="detailMedia"></div>
    <div class="count-line" id="detailSerial"></div>
    <div class="frm">
      <label>年月日</label><input type="date" id="eHizuke">
      <label>科目（中）</label><select id="eChu"></select>
      <label>科目（大）</label><select id="eDai"></select>
      <label>適用</label><input id="eTekiyou" placeholder="支出理由">
      <label>金額（税込）</label><input type="number" id="eKingaku" inputmode="numeric">
      <label>支払先名</label><input id="eSaki">
      <label>住所</label><input id="eJusho">
      <label>領収書番号</label><input id="eRyoNo">
      <label>支出者</label><input id="eWho">
      <label>メモ</label><textarea id="eMemo" rows="2"></textarea>
      <label>チェック</label>
      <div class="chk">
        <label><input type="checkbox" id="eChonan"> 徴難</label>
        <label><input type="checkbox" id="ePaid"> 返金済</label>
      </div>
    </div>
    <div id="detailOcr"></div>
    <div class="actions">
      <button class="btn wide" onclick="updateRecord()">修正を保存</button>
      <button class="btn danger" onclick="deleteRecord()">削除</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ================================================================ 設定 */
const SUPABASE_URL      = "https://oxekrlgsfkhjaqssrzvk.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_jXTK6ilznGBS-BEx8Ibcfw_kqOQhrv7";
const BUCKET   = "poster-media";
const TABLE    = "receipts";
const PASSCODE = "sano2026";
const OCR_FN   = "ocr-receipt";
const MAX_IMG_PX = 1600;
/* 科目分類：中項目（画面インデックス）→ 大項目・帳簿費目・補助簿コード
   ※元XML（会計帳簿ソフト/補助簿データ）の実際の計上実績に合わせたマッピング */
const KAMOKU = [
  {chu:"交通費",   dai:"組織活動費",     himoku:"交通費", code:"2211001", k1:"[支出]2(1) 組織活動費",     k2:"交通費"},
  {chu:"消耗品費", dai:"備品・消耗品費", himoku:"消耗品", code:"2131002", k1:"[支出]1(3) 備品・消耗品費", k2:"消耗品"},
  {chu:"雑費",     dai:"事務所費",       himoku:"雑費",   code:"2141001", k1:"[支出]1(4) 事務所費",       k2:"雑費"},
  {chu:"備品費",   dai:"備品・消耗品費", himoku:"備品",   code:"2131001", k1:"[支出]1(3) 備品・消耗品費", k2:"備品"},
  {chu:"通信費",   dai:"事務所費",       himoku:"通信費", code:"2141003", k1:"[支出]1(4) 事務所費",       k2:"通信費"},
  {chu:"会費",     dai:"組織活動費",     himoku:"渉外費", code:"2211003", k1:"[支出]2(1) 組織活動費",     k2:"渉外費"},
  {chu:"会食費",   dai:"組織活動費",     himoku:"会議費", code:"2211002", k1:"[支出]2(1) 組織活動費",     k2:"会議費"},
  {chu:"その他",   dai:"その他の経費",   himoku:"その他", code:"2261000", k1:"[支出]2(6) その他の経費",   k2:""}
];
/* 大項目を手動変更した場合の補助簿コード（大項目レベルのコードに計上） */
const DAI_CODE = {
  "人件費":       {code:"2111000", k1:"[支出]1(1) 人件費", k2:""},
  "光熱水費":     {code:"2121000", k1:"[支出]1(2) 光熱水費", k2:""},
  "備品・消耗品費":{code:"2131000", k1:"[支出]1(3) 備品・消耗品費", k2:""},
  "事務所費":     {code:"2141000", k1:"[支出]1(4) 事務所費", k2:""},
  "組織活動費":   {code:"2211000", k1:"[支出]2(1) 組織活動費", k2:""},
  "選挙関係費":   {code:"2221000", k1:"[支出]2(2) 選挙関係費", k2:""},
  "機関紙誌の発行その他の事業費":{code:"2234000", k1:"[支出]2(3)エ　その他の事業費", k2:""},
  "調査研究費":   {code:"2241000", k1:"[支出]2(4) 調査研究費", k2:""},
  "寄附・交付金": {code:"2251000", k1:"[支出]2(5) 寄附・交付金", k2:""},
  "その他の経費": {code:"2261000", k1:"[支出]2(6) その他の経費", k2:""}
};
const SEC_BY_DAI = {
  "人件費":"KAIKEI_OUT01_1","光熱水費":"KAIKEI_OUT01_2","備品・消耗品費":"KAIKEI_OUT01_3",
  "事務所費":"KAIKEI_OUT01_4","組織活動費":"KAIKEI_OUT02_1","選挙関係費":"KAIKEI_OUT02_2",
  "機関紙誌の発行その他の事業費":"KAIKEI_OUT02_3_2","調査研究費":"KAIKEI_OUT02_4",
  "寄附・交付金":"KAIKEI_OUT02_5","その他の経費":"KAIKEI_OUT02_6"
};
const DAI_LIST = ["人件費","光熱水費","備品・消耗品費","事務所費","組織活動費","選挙関係費","機関紙誌の発行その他の事業費","調査研究費","寄附・交付金","その他の経費"];
/* ================================================================ */

const $ = id => document.getElementById(id);
const sb = (path, opt={}) => fetch(SUPABASE_URL + path, {
  ...opt, headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer " + SUPABASE_ANON_KEY, ...(opt.headers||{}) }
});
const pubUrl = p => `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${p}`;
const esc = s => String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ---------- パスコード ---------- */
function checkGate(){
  if($("gateInput").value === PASSCODE){ localStorage.setItem("poster_gate","ok"); $("gate").style.display="none"; }
  else $("gateMsg").textContent="パスコードが違います";
}
if(!PASSCODE || localStorage.getItem("poster_gate")==="ok") $("gate").style.display="none";
$("gateInput").addEventListener("keydown", e=>{ if(e.key==="Enter") checkGate(); });

function setHH(){ document.documentElement.style.setProperty("--hh", document.querySelector("header").offsetHeight+"px"); }
setHH(); window.addEventListener("resize", setHH);

let toastTimer;
function toast(msg, err){
  const t=$("toast"); t.textContent=msg; t.className= err ? "err show" : "show";
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"), 2600);
}

/* ---------- ビュー ---------- */
function switchView(v){
  $("viewShoot").classList.toggle("show", v==="shoot");
  $("viewList").classList.toggle("show", v==="list");
  $("viewAgg").classList.toggle("show", v==="agg");
  $("hList").classList.toggle("active", v==="list");
  $("hAgg").classList.toggle("active", v==="agg");
  if(v==="list") loadList(!listLoaded);
  if(v==="agg") loadList(true);
}

/* ---------- 支出者名（端末に記憶） ---------- */
$("who").value = localStorage.getItem("receipt_who") || "";
$("who").addEventListener("change", ()=>localStorage.setItem("receipt_who", $("who").value.trim()));

/* ---------- 科目チップ（単一選択） ---------- */
let curChu = null;
function buildCats(){
  $("catGrid").innerHTML = KAMOKU.map(k=>
    `<div class="cat${k.chu===curChu?" on":""}" onclick="setChu('${k.chu}')">${k.chu}</div>`).join("");
}
function setChu(chu){ curChu = (curChu===chu)? null : chu; buildCats(); }
buildCats();

/* ---------- 撮影 ---------- */
let curFile=null;
function pickMedia(){ $("fileP").click(); }
$("fileP").addEventListener("change", e=>{
  const f=e.target.files[0]; if(!f) return;
  curFile=f;
  $("preview").innerHTML = `<img src="${URL.createObjectURL(f)}">`;
});

async function compressImage(file, maxPx=MAX_IMG_PX, quality=0.85){
  try{
    const bmp=await createImageBitmap(file);
    const s=Math.min(1, maxPx/Math.max(bmp.width,bmp.height));
    if(s>=1 && file.type==="image/jpeg" && maxPx===MAX_IMG_PX) return file;
    const cv=document.createElement("canvas");
    cv.width=Math.max(1,Math.round(bmp.width*s)); cv.height=Math.max(1,Math.round(bmp.height*s));
    cv.getContext("2d").drawImage(bmp,0,0,cv.width,cv.height);
    const b=await new Promise(r=>cv.toBlob(r,"image/jpeg",quality));
    return b||file;
  }catch(e){ return file; }
}

let recog=null, recTarget=null, recBtn=null;
function toggleMic(targetId, btnId){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ toast("この端末は音声入力に非対応です（キーボードのマイクをご利用ください）", true); return; }
  if(recog){ recog.stop(); return; }
  recTarget=$(targetId); recBtn=$(btnId);
  recog=new SR();
  recog.lang="ja-JP"; recog.interimResults=false; recog.continuous=true;
  recog.onresult=ev=>{
    let txt="";
    for(let i=ev.resultIndex;i<ev.results.length;i++)
      if(ev.results[i].isFinal) txt+=ev.results[i][0].transcript;
    if(txt && recTarget){
      recTarget.value = recTarget.value ? (recTarget.value.replace(/\s+$/,"")+" "+txt) : txt;
      recTarget.dispatchEvent(new Event("input"));
    }
  };
  recog.onstart=()=>recBtn.classList.add("rec");
  const done=()=>{ if(recBtn) recBtn.classList.remove("rec"); recog=null; recTarget=null; recBtn=null; };
  recog.onend=done; recog.onerror=done;
  recog.start();
}

/* ---------- 会計帳簿XML出力：元XMLに明細を追記した完全版を生成 ---------- */
function wareki(iso){  // yyyy-mm-dd → R{n}/MM/DD
  if(!iso) return "";
  const [y,m,d]=iso.split("-").map(Number);
  return `R${y-2018}/${String(m).padStart(2,"0")}/${String(d).padStart(2,"0")}`;
}
const xesc=s=>String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function pickBaseXml(){
  if(!rows.length){ toast("データがありません", true); return; }
  const valid=rows.filter(r=>r.hizuke && r.kingaku>0);
  const skip=rows.length-valid.length;
  if(!valid.length){ toast("年月日と金額が入った明細がありません（一覧で修正してください）", true); return; }
  if(!confirm(
    `会計帳簿ソフトから出力した「元XMLファイル」を選択してください。\n`+
    `元XMLの内容はそのままに、このアプリの明細 ${valid.length} 件を追記し、`+
    `各科目の小計・経常経費計・政治活動費計・支出総額・翌年繰越を再計算した完全版XMLを作ります。\n`+
    (skip? `※日付または金額が未入力の ${skip} 件は追記されません。\n`:"")+
    `※二重計上を防ぐため、必ず「追記前の元XML」を選んでください。`)) return;
  $("baseXml").value="";
  $("baseXml").click();
}
$("baseXml").addEventListener("change", e=>{
  const f=e.target.files[0]; if(!f) return;
  const fr=new FileReader();
  fr.onload=()=>{ try{ mergeXml(new Uint8Array(fr.result)); }catch(err){ console.error(err); alert("XMLの処理に失敗しました：\n"+err.message); } };
  fr.readAsArrayBuffer(f);
});

function mergeXml(bytes){
  /* Shift_JIS → Unicode 文字列 */
  let xml=Encoding.codeToString(Encoding.convert(bytes,{to:"UNICODE",from:"SJIS"}));
  if(!xml.includes("<BOOK>")) throw new Error("会計帳簿ソフトのXML形式ではありません（<BOOK>が見つかりません）");

  const valid=rows.filter(r=>r.hizuke && r.kingaku>0)
    .sort((a,b)=>(a.hizuke<b.hizuke?-1:1));

  /* 形式を自動判別：補助簿データ or 会計帳簿データ */
  if(xml.includes("<HOJYOBO_VALUE>")) mergeHojyobo(xml, valid);
  else if(xml.includes("<KAIKEI_OUT01_1>")) mergeKaikei(xml, valid);
  else throw new Error("対応していないXML形式です（補助簿データ／会計帳簿データのどちらでもありません）");
}

/* ====== 補助簿データ形式（HOJYOBO_VALUE 明細＋KUBUN_SHISYUTU コード集計） ====== */
function mergeHojyobo(xml, valid){
  /* 明細のコード割り当て */
  const items=valid.map(r=>{
    const k=KAMOKU.find(x=>x.chu===r.kamoku_chu);
    let c;
    if(k && (r.kamoku_dai===k.dai || !r.kamoku_dai)) c={code:k.code,k1:k.k1,k2:k.k2};
    else c=DAI_CODE[r.kamoku_dai] || DAI_CODE["その他の経費"];
    return {...r, ...c};
  });
  const addedTotal=items.reduce((s,r)=>s+r.kingaku,0);

  /* --- 1) HOJYOBO_VALUE に明細ROWを追記 --- */
  const hv=xml.match(/<HOJYOBO_VALUE>([\s\S]*?)<\/HOJYOBO_VALUE>/);
  if(!hv) throw new Error("HOJYOBO_VALUE が見つかりません");
  let vbody=hv[1];
  let no=0;
  (vbody.match(/<ICHIREN_NO>(\d+)<\/ICHIREN_NO>/g)||[])
    .forEach(s=>{ const n=parseInt(s.replace(/\D/g,""),10); if(n>no) no=n; });
  const VROW=(n,r)=>
    `\t\t\t<ROW>\r\n`+
    `\t\t\t\t<ICHIREN_NO>${n}</ICHIREN_NO>\r\n`+
    `\t\t\t\t<CODE_NO>${r.code}</CODE_NO>\r\n`+
    `\t\t\t\t<KOUMOKU1_NM>${xesc(r.k1)}</KOUMOKU1_NM>\r\n`+
    `\t\t\t\t<KOUMOKU2_NM>${xesc(r.k2)}</KOUMOKU2_NM>\r\n`+
    `\t\t\t\t<CMN_TEKIYOU_TOKU>0</CMN_TEKIYOU_TOKU>\r\n`+
    `\t\t\t\t<CMN_TEKIYOU_TOKU_NM></CMN_TEKIYOU_TOKU_NM>\r\n`+
    `\t\t\t\t<CMN_TEKIYOU>${xesc(r.tekiyou||r.kamoku_chu)}</CMN_TEKIYOU>\r\n`+
    `\t\t\t\t<CMN_KINGAKU>${r.kingaku}</CMN_KINGAKU>\r\n`+
    `\t\t\t\t<CMN_KOUFU_KINGAKU>0</CMN_KOUFU_KINGAKU>\r\n`+
    `\t\t\t\t<CMN_KIKIN_KINGAKU>0</CMN_KIKIN_KINGAKU>\r\n`+
    `\t\t\t\t<CMN_DT>${wareki(r.hizuke)}</CMN_DT>\r\n`+
    `\t\t\t\t<SYU_ADR></SYU_ADR>\r\n`+
    `\t\t\t\t<SYU_SYOKUGYO></SYU_SYOKUGYO>\r\n`+
    `\t\t\t\t<SYU_KIFU_BASYO></SYU_KIFU_BASYO>\r\n`+
    `\t\t\t\t<SYU_KIKAN1></SYU_KIKAN1>\r\n`+
    `\t\t\t\t<SYU_KIKAN2></SYU_KIKAN2>\r\n`+
    `\t\t\t\t<SYU_BIKOU></SYU_BIKOU>\r\n`+
    `\t\t\t\t<SYU_SEQ_NO></SYU_SEQ_NO>\r\n`+
    `\t\t\t\t<SYU_ZEIGAKUKOUJYO>0</SYU_ZEIGAKUKOUJYO>\r\n`+
    `\t\t\t\t<SYU_SU></SYU_SU>\r\n`+
    `\t\t\t\t<SYU_SHIHARAI_SU></SYU_SHIHARAI_SU>\r\n`+
    `\t\t\t\t<SYU_SHIHARAI_SU_ZENNEN></SYU_SHIHARAI_SU_ZENNEN>\r\n`+
    `\t\t\t\t<SYU_ZENNEN_KINGAKU></SYU_ZENNEN_KINGAKU>\r\n`+
    `\t\t\t\t<SYU_TOKUTEI_PATYI>0</SYU_TOKUTEI_PATYI>\r\n`+
    `\t\t\t\t<SYU_KYOUDOU_KAISAI>0</SYU_KYOUDOU_KAISAI>\r\n`+
    `\t\t\t\t<SYU_KYOUDOU_KAISAI_NM></SYU_KYOUDOU_KAISAI_NM>\r\n`+
    `\t\t\t\t<SYU_TOKUTEI_PATYI_NM></SYU_TOKUTEI_PATYI_NM>\r\n`+
    `\t\t\t\t<SYU_MEMO></SYU_MEMO>\r\n`+
    `\t\t\t\t<SHI_UKE_KOU>0</SHI_UKE_KOU>\r\n`+
    `\t\t\t\t<SHI_UKE_KOU_NM></SHI_UKE_KOU_NM>\r\n`+
    `\t\t\t\t<SHI_UKE_NM>${xesc(r.shiharaisaki)}</SHI_UKE_NM>\r\n`+
    `\t\t\t\t<SHI_ADR>${xesc(r.jusho)}</SHI_ADR>\r\n`+
    `\t\t\t\t<SHI_BIKOU></SHI_BIKOU>\r\n`+
    `\t\t\t\t<SHI_SEQ_NO></SHI_SEQ_NO>\r\n`+
    `\t\t\t\t<SHI_RYOUSYU_NO>${xesc(r.ryoshusho_no)}</SHI_RYOUSYU_NO>\r\n`+
    `\t\t\t\t<SHI_YOUSHIKI>0</SHI_YOUSHIKI>\r\n`+
    `\t\t\t\t<SHI_YOUSHIKI_NM></SHI_YOUSHIKI_NM>\r\n`+
    `\t\t\t\t<SHI_JIJYOU>${r.chonan?1:0}</SHI_JIJYOU>\r\n`+
    `\t\t\t\t<SHI_JIJYOU_NM>${r.chonan? xesc(r.memo):""}</SHI_JIJYOU_NM>\r\n`+
    `\t\t\t\t<SHI_MEMO></SHI_MEMO>\r\n`+
    `\t\t\t\t<MEMO>${xesc(r.memo)}</MEMO>\r\n`+
    `\t\t\t</ROW>\r\n`;
  let rowXml=""; items.forEach(r=>{ no++; rowXml+=VROW(no,r); });
  vbody=vbody.replace(/\t\t<\/SHEET>/, rowXml+`\t\t</SHEET>`);
  xml=xml.replace(hv[0], `<HOJYOBO_VALUE>${vbody}</HOJYOBO_VALUE>`);

  /* --- 2) KUBUN_SHISYUTU（分類集計）の金額を加算 --- */
  const ks=xml.match(/<KUBUN_SHISYUTU>([\s\S]*?)<\/KUBUN_SHISYUTU>/);
  if(!ks) throw new Error("KUBUN_SHISYUTU が見つかりません");
  let kbody=ks[1];
  /* コード別加算額を集計（本体＋大項目親＋経常/政治ロールアップ） */
  const bump={};   // key: "code:2141001" or "koumoku:1　経常経費" -> 加算額
  const add=(k,v)=>{ bump[k]=(bump[k]||0)+v; };
  items.forEach(r=>{
    add("code:"+r.code, r.kingaku);
    const parent=r.code.slice(0,4)+"000";
    if(parent!==r.code) add("code:"+parent, r.kingaku);
    if(r.code.startsWith("223")) add("koumoku:(3) 機関紙誌の発行その他の事業費", r.kingaku);
    if(r.code.startsWith("21")) add("koumoku:1　経常経費", r.kingaku);
    else add("koumoku:2  政治活動費", r.kingaku);
  });
  const krows=kbody.match(/<ROW>[\s\S]*?<\/ROW>/g)||[];
  for(const key in bump){
    const [kind,val]=[key.slice(0,key.indexOf(":")), key.slice(key.indexOf(":")+1)];
    const target=krows.find(g=>{
      if(kind==="code") return (g.match(/<CODE_NO>(.*?)<\/CODE_NO>/)||[])[1]===val;
      return (g.match(/<KOUMOKU>(.*?)<\/KOUMOKU>/)||[])[1]===val;
    });
    if(!target) throw new Error(`分類「${val}」の行が元XMLに見つかりません`);
    const ng=target.replace(/<KINGAKU>(\d+)<\/KINGAKU>/,
      (s,v)=>`<KINGAKU>${parseInt(v,10)+bump[key]}</KINGAKU>`);
    kbody=kbody.replace(target,ng);
  }
  /* 支出合計ヘッダ */
  kbody=kbody.replace(/<HONNEN_KINGAKU_GK>(\d+)<\/HONNEN_KINGAKU_GK>/,
    (s,v)=>`<HONNEN_KINGAKU_GK>${parseInt(v,10)+addedTotal}</HONNEN_KINGAKU_GK>`);
  xml=xml.replace(ks[0], `<KUBUN_SHISYUTU>${kbody}</KUBUN_SHISYUTU>`);

  /* --- 3) 総計・繰越の再計算 --- */
  const syunyu=parseInt((xml.match(/<SYUNYU_SGK>(\d+)<\/SYUNYU_SGK>/)||[0,"0"])[1],10);
  const sisyutu=parseInt(xml.match(/<KUBUN_SHISYUTU>[\s\S]*?<HONNEN_KINGAKU_GK>(\d+)<\/HONNEN_KINGAKU_GK>/)[1],10);
  const kurikoshi=syunyu-sisyutu;
  xml=xml.replace(/<SISYUTU_SGK>\d+<\/SISYUTU_SGK>/, `<SISYUTU_SGK>${sisyutu}</SISYUTU_SGK>`);
  xml=xml.replace(/<YOKUNEN_KKS_GK>-?\d+<\/YOKUNEN_KKS_GK>/g, `<YOKUNEN_KKS_GK>${kurikoshi}</YOKUNEN_KKS_GK>`);

  saveXml(xml, "補助簿データ_明細追記", items.length,
    `支出総額: ¥${sisyutu.toLocaleString()}\n翌年への繰越額: ¥${kurikoshi.toLocaleString()}`+
    (kurikoshi<0? "\n\n※繰越額がマイナスです。収入の入力漏れがないか帳簿側をご確認ください。":""));
}

/* ====== 会計帳簿データ形式（KAIKEI_OUTxx セクション） ====== */
function mergeKaikei(xml, valid){
  const plan={};   // sec -> himoku -> rows[]
  valid.forEach(r=>{
    const k=KAMOKU.find(x=>x.chu===r.kamoku_chu);
    let sec, himoku;
    if(k && (r.kamoku_dai===k.dai || !r.kamoku_dai)){
      sec=SEC_BY_DAI[k.dai]; himoku=k.himoku;
    }else{
      sec=SEC_BY_DAI[r.kamoku_dai] || SEC_BY_DAI["その他の経費"];
      himoku=(k? k.himoku : r.kamoku_chu) || "その他";
    }
    plan[sec]=plan[sec]||{}; plan[sec][himoku]=plan[sec][himoku]||[];
    plan[sec][himoku].push(r);
  });

  const ROWXML=(no,r)=>
    `\t\t\t\t<ROW>\r\n`+
    `\t\t\t\t\t<ICHIREN_NO>${no}</ICHIREN_NO>\r\n`+
    `\t\t\t\t\t<TEKIYOU>${xesc(r.tekiyou||r.kamoku_chu)}</TEKIYOU>\r\n`+
    `\t\t\t\t\t<KINGAKU>${r.kingaku}</KINGAKU>\r\n`+
    `\t\t\t\t\t<KINGAKU_KOUFU>0</KINGAKU_KOUFU>\r\n`+
    `\t\t\t\t\t<KINGAKU_KIKIN>0</KINGAKU_KIKIN>\r\n`+
    `\t\t\t\t\t<DT>${wareki(r.hizuke)}</DT>\r\n`+
    `\t\t\t\t\t<KOUFU_UMU>0</KOUFU_UMU>\r\n`+
    `\t\t\t\t\t<NM>${xesc(r.shiharaisaki)}</NM>\r\n`+
    `\t\t\t\t\t<ADR>${xesc(r.jusho)}</ADR>\r\n`+
    `\t\t\t\t\t<BIKOU></BIKOU>\r\n`+
    `\t\t\t\t\t<SEQ_NO></SEQ_NO>\r\n`+
    `\t\t\t\t\t<RYOUSYU_NO>${xesc(r.ryoshusho_no)}</RYOUSYU_NO>\r\n`+
    `\t\t\t\t\t<RYOUSYU>${r.chonan?1:0}</RYOUSYU>\r\n`+
    `\t\t\t\t\t<JIJYOU>${r.chonan? xesc(r.memo):""}</JIJYOU>\r\n`+
    `\t\t\t\t\t<MEMO>${xesc(r.memo)}</MEMO>\r\n`+
    `\t\t\t\t\t<ROWKBN>0</ROWKBN>\r\n`+
    `\t\t\t\t</ROW>\r\n`;

  let added=0;
  for(const sec in plan){
    const re=new RegExp(`<${sec}>([\\s\\S]*?)</${sec}>`);
    const m=xml.match(re);
    if(!m) throw new Error(`セクション ${sec} が元XMLに見つかりません`);
    let body=m[1];
    let no=0;
    (body.match(/<ICHIREN_NO>(\d+)<\/ICHIREN_NO>/g)||[])
      .forEach(s=>{ const n=parseInt(s.replace(/\D/g,""),10); if(n>no) no=n; });
    let secAdd=0;
    for(const himoku in plan[sec]){
      const rs=plan[sec][himoku];
      const sum=rs.reduce((s,r)=>s+r.kingaku,0);
      secAdd+=sum; added+=rs.length;
      let rowXml=""; rs.forEach(r=>{ no++; rowXml+=ROWXML(no,r); });
      const groups=body.match(/<GROUP>[\s\S]*?<\/GROUP>/g)||[];
      const target=groups.find(g=>{
        const hm=g.match(/<HIMOKU>([\s\S]*?)<\/HIMOKU>/);
        return hm && hm[1]===himoku;
      });
      if(target){
        let ng=target.replace(/\t\t\t<\/GROUP>$/, rowXml+`\t\t\t</GROUP>`);
        ng=ng.replace(/<GROUP_SKEI>(\d+)<\/GROUP_SKEI>/,
          (s,v)=>`<GROUP_SKEI>${parseInt(v,10)+sum}</GROUP_SKEI>`);
        body=body.replace(target,ng);
      }else{
        const placeholder=groups.find(g=>/<HIMOKU><\/HIMOKU>/.test(g) && !/<ROW>/.test(g));
        const ng=`<GROUP>\r\n`+
          `\t\t\t\t<HIMOKU>${xesc(himoku)}</HIMOKU>\r\n`+
          `\t\t\t\t<GROUP_SKEI>${sum}</GROUP_SKEI>\r\n`+
          `\t\t\t\t<GROUP_SKEI_KOUFU>0</GROUP_SKEI_KOUFU>\r\n`+
          `\t\t\t\t<GROUP_SKEI_KIKIN>0</GROUP_SKEI_KIKIN>\r\n`+
          rowXml+`\t\t\t</GROUP>`;
        if(placeholder) body=body.replace(placeholder,ng);
        else body=body.replace(/\t\t<\/SHEET>/, `\t\t\t${ng}\r\n\t\t</SHEET>`);
      }
    }
    body=body.replace(/<KINGAKU_GK>(\d+)<\/KINGAKU_GK>/,
      (s,v)=>`<KINGAKU_GK>${parseInt(v,10)+secAdd}</KINGAKU_GK>`);
    xml=xml.replace(m[0], `<${sec}>${body}</${sec}>`);
  }

  const secGK=name=>{
    const m2=xml.match(new RegExp(`<${name}>[\\s\\S]*?<KINGAKU_GK>(\\d+)</KINGAKU_GK>`));
    return m2? parseInt(m2[1],10):0;
  };
  const keihi=["KAIKEI_OUT01_1","KAIKEI_OUT01_2","KAIKEI_OUT01_3","KAIKEI_OUT01_4"]
    .reduce((s,n)=>s+secGK(n),0);
  const katsudou=["KAIKEI_OUT02_1","KAIKEI_OUT02_2","KAIKEI_OUT02_3_1","KAIKEI_OUT02_3_2",
    "KAIKEI_OUT02_3_3","KAIKEI_OUT02_3_4","KAIKEI_OUT02_4","KAIKEI_OUT02_5","KAIKEI_OUT02_6"]
    .reduce((s,n)=>s+secGK(n),0);
  xml=xml.replace(/<KEIHI_SOUKEI_GK>\d+<\/KEIHI_SOUKEI_GK>/, `<KEIHI_SOUKEI_GK>${keihi}</KEIHI_SOUKEI_GK>`);
  xml=xml.replace(/<KATUDOU_SOUKEI_GK>\d+<\/KATUDOU_SOUKEI_GK>/, `<KATUDOU_SOUKEI_GK>${katsudou}</KATUDOU_SOUKEI_GK>`);
  const sisyutu=keihi+katsudou;
  const syunyu=parseInt((xml.match(/<SYUNYU_SGK>(\d+)<\/SYUNYU_SGK>/)||[0,"0"])[1],10);
  xml=xml.replace(/<SISYUTU_SGK>\d+<\/SISYUTU_SGK>/, `<SISYUTU_SGK>${sisyutu}</SISYUTU_SGK>`);
  const kurikoshi=syunyu-sisyutu;
  xml=xml.replace(/<YOKUNEN_KKS_GK>-?\d+<\/YOKUNEN_KKS_GK>/, `<YOKUNEN_KKS_GK>${kurikoshi}</YOKUNEN_KKS_GK>`);

  saveXml(xml, "会計帳簿データ_明細追記", added,
    `経常経費計: ¥${keihi.toLocaleString()}\n政治活動費計: ¥${katsudou.toLocaleString()}\n支出総額: ¥${sisyutu.toLocaleString()}\n翌年への繰越額: ¥${kurikoshi.toLocaleString()}`+
    (kurikoshi<0? "\n\n※繰越額がマイナスです。収入の入力漏れがないか会計帳簿側をご確認ください。":""));
}

/* ====== Shift_JIS で保存＋結果表示（共通） ====== */
function saveXml(xml, prefix, added, summary){
  const sjis=Encoding.convert(Encoding.stringToCode(xml),{to:"SJIS",from:"UNICODE"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([new Uint8Array(sjis)],{type:"application/xml"}));
  const d=new Date(), z=n=>String(n).padStart(2,"0");
  a.download=`${prefix}_${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}.xml`;
  a.click();
  alert(`完全版XMLを出力しました。\n追記明細: ${added} 件\n${summary}`);
}

/* ---------- CSV出力 ---------- */
function exportCsv(){
  if(!rows.length){ toast("データがありません", true); return; }
  const q=s=>`"${String(s??"").replace(/"/g,'""')}"`;
  const head=["通し番号","年月日","科目（大）","科目（中）","適用","金額","支払先名","住所","領収書番号","徴難","メモ","支出者","返金済"];
  const body=[...rows].sort((a,b)=>(a.serial_no||0)-(b.serial_no||0)).map(r=>[
    r.serial_no, fmtD(r.hizuke), r.kamoku_dai, r.kamoku_chu, r.tekiyou, r.kingaku??"",
    r.shiharaisaki, r.jusho, r.ryoshusho_no, r.chonan?"○":"", r.memo, r.shishutsusha, r.paid?"○":""]);
  const text="\uFEFF"+[head,...body].map(a=>a.map(q).join(",")).join("\r\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([text],{type:"text/csv"}));
  a.download=`領収書一覧_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
